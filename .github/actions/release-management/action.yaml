---
name: Release Management
description: Automated versioning and changelog generation using release-please or semantic-release

inputs:
  github-token:
    description: GitHub token with contents write and pull-requests write permissions
    required: true

  strategy:
    description: Release strategy (release-please or semantic-release)
    required: false
    default: release-please

  release-type:
    description: Release type (node, python, simple)
    required: false
    default: simple

  package-name:
    description: Package name for release
    required: false
    default: ''

  bump-minor-pre-major:
    description: Bump minor version before major release
    required: false
    default: 'true'

  bump-patch-for-minor-pre-major:
    description: Bump patch version for minor pre-major
    required: false
    default: 'false'

  changelog-types:
    description: Custom changelog types as JSON
    required: false
    default: |
      [
        {"type":"feat","section":"Features","hidden":false},
        {"type":"fix","section":"Bug Fixes","hidden":false},
        {"type":"perf","section":"Performance Improvements","hidden":false},
        {"type":"revert","section":"Reverts","hidden":false},
        {"type":"docs","section":"Documentation","hidden":false},
        {"type":"style","section":"Styles","hidden":true},
        {"type":"chore","section":"Miscellaneous Chores","hidden":true},
        {"type":"refactor","section":"Code Refactoring","hidden":false},
        {"type":"test","section":"Tests","hidden":true},
        {"type":"build","section":"Build System","hidden":true},
        {"type":"ci","section":"Continuous Integration","hidden":true}
      ]

  force-patch-on-no-release:
    description: For semantic-release, create a patch release when no releasable commits are found
    required: false
    default: 'false'

  extra-plugins:
    description: Extra semantic-release plugins to install (multiline, one per line)
    required: false
    default: ''

outputs:
  release-created:
    description: Whether a release was created
    value: ${{ steps.normalize.outputs.release-created }}

  release-id:
    description: Release ID
    value: ${{ steps.normalize.outputs.release-id }}

  release-name:
    description: Release name
    value: ${{ steps.normalize.outputs.release-name }}

  release-tag:
    description: Release tag
    value: ${{ steps.normalize.outputs.release-tag }}

  release-version:
    description: Release version (without 'v' prefix)
    value: ${{ steps.normalize.outputs.release-version }}

  release-major:
    description: Major version
    value: ${{ steps.normalize.outputs.release-major }}

  release-minor:
    description: Minor version
    value: ${{ steps.normalize.outputs.release-minor }}

  release-patch:
    description: Patch version
    value: ${{ steps.normalize.outputs.release-patch }}

  release-sha:
    description: Release commit SHA
    value: ${{ steps.normalize.outputs.release-sha }}

  release-upload-url:
    description: Upload URL for release assets
    value: ${{ steps.normalize.outputs.release-upload-url }}

  pr-number:
    description: Release PR number (if PR was opened/updated)
    value: ${{ steps.normalize.outputs.pr-number }}

runs:
  using: composite
  steps:
    - name: Run Release Please
      id: release-please
      if: inputs.strategy == 'release-please'
      uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
      with:
        token: ${{ inputs.github-token }}
        release-type: ${{ inputs.release-type }}
        package-name: ${{ inputs.package-name }}
        bump-minor-pre-major: ${{ inputs.bump-minor-pre-major }}
        bump-patch-for-minor-pre-major: ${{ inputs.bump-patch-for-minor-pre-major }}
        changelog-types: ${{ inputs.changelog-types }}

    - name: Run Semantic Release
      id: semantic-release
      if: inputs.strategy == 'semantic-release'
      uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
      with:
        semantic_version: 24
        extra_plugins: ${{ inputs.extra-plugins }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Fallback Patch Release (Semantic Release No-Op)
      id: fallback-release
      if:
        inputs.strategy == 'semantic-release' && inputs.force-patch-on-no-release == 'true' &&
        steps.semantic-release.outputs.new_release_published != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        TARGET_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        git fetch --tags --force

        latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
        if [[ -z "$latest_tag" ]]; then
          latest_tag="v0.0.0"
        fi

        latest_version="${latest_tag#v}"
        IFS='.' read -r major minor patch <<< "$latest_version"
        major="${major:-0}"
        minor="${minor:-0}"
        patch="${patch:-0}"
        next_patch=$((patch + 1))
        next_tag="v${major}.${minor}.${next_patch}"

        if gh release view "$next_tag" --repo "$REPO" >/dev/null 2>&1; then
          echo "created=false" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "version=${next_tag#v}" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/$REPO/releases/tag/$next_tag" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        gh release create "$next_tag" \
          --repo "$REPO" \
          --target "$TARGET_SHA" \
          --generate-notes \
          --latest \
          --title "$next_tag"

        echo "created=true" >> "$GITHUB_OUTPUT"
        echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
        echo "version=${next_tag#v}" >> "$GITHUB_OUTPUT"
        echo "url=https://github.com/$REPO/releases/tag/$next_tag" >> "$GITHUB_OUTPUT"

    - name: Normalize Release Outputs
      id: normalize
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        REPO: ${{ github.repository }}
        RP_RELEASE_CREATED: ${{ steps.release-please.outputs.release_created }}
        RP_TAG_NAME: ${{ steps.release-please.outputs.tag_name }}
        RP_RELEASE_ID: ${{ steps.release-please.outputs.id }}
        RP_RELEASE_NAME: ${{ steps.release-please.outputs.name }}
        RP_RELEASE_SHA: ${{ steps.release-please.outputs.sha }}
        RP_UPLOAD_URL: ${{ steps.release-please.outputs.upload_url }}
        RP_PR: ${{ steps.release-please.outputs.pr }}
        RP_MAJOR: ${{ steps.release-please.outputs.major }}
        RP_MINOR: ${{ steps.release-please.outputs.minor }}
        RP_PATCH: ${{ steps.release-please.outputs.patch }}
        SR_PUBLISHED: ${{ steps.semantic-release.outputs.new_release_published }}
        SR_VERSION: ${{ steps.semantic-release.outputs.new_release_version }}
        SR_TAG: ${{ steps.semantic-release.outputs.new_release_git_tag }}
        FB_CREATED: ${{ steps.fallback-release.outputs.created }}
        FB_TAG: ${{ steps.fallback-release.outputs.tag }}
        FB_VERSION: ${{ steps.fallback-release.outputs.version }}
        FB_URL: ${{ steps.fallback-release.outputs.url }}
      run: |
        set -euo pipefail
        release_created="false"
        release_id=""
        release_name=""
        release_tag=""
        release_version=""
        release_major=""
        release_minor=""
        release_patch=""
        release_sha=""
        release_upload_url=""
        pr_number=""

        if [[ "$STRATEGY" == "semantic-release" ]]; then
          if [[ "$SR_PUBLISHED" == "true" ]]; then
            release_created="true"
            release_tag="$SR_TAG"
            release_version="$SR_VERSION"
            release_sha="${GITHUB_SHA}"
            if [[ -n "$release_tag" ]]; then
              release_name="$release_tag"
              release_upload_url="https://github.com/$REPO/releases/tag/$release_tag"
            fi
          elif [[ "$FB_CREATED" == "true" ]]; then
            release_created="true"
            release_tag="$FB_TAG"
            release_version="$FB_VERSION"
            release_sha="${GITHUB_SHA}"
            release_name="$FB_TAG"
            release_upload_url="$FB_URL"
          fi
        else
          [[ "$RP_RELEASE_CREATED" == "true" ]] && release_created="true"
          release_id="$RP_RELEASE_ID"
          release_name="$RP_RELEASE_NAME"
          release_tag="$RP_TAG_NAME"
          release_sha="$RP_RELEASE_SHA"
          release_upload_url="$RP_UPLOAD_URL"
          release_major="$RP_MAJOR"
          release_minor="$RP_MINOR"
          release_patch="$RP_PATCH"
          if [[ -n "$release_major" && -n "$release_minor" && -n "$release_patch" ]]; then
            release_version="${release_major}.${release_minor}.${release_patch}"
          elif [[ -n "$release_tag" ]]; then
            release_version="${release_tag#v}"
          fi

          # release-please can return PR output as JSON; extract number cleanly.
          if [[ "$RP_PR" =~ ^\{ ]]; then
            pr_number=$(echo "$RP_PR" | jq -r '.number // empty' 2>/dev/null || true)
          elif [[ "$RP_PR" =~ ^[0-9]+$ ]]; then
            pr_number="$RP_PR"
          fi
        fi

        {
          echo "release-created=$release_created"
          echo "release-id=$release_id"
          echo "release-name=$release_name"
          echo "release-tag=$release_tag"
          echo "release-version=$release_version"
          echo "release-major=$release_major"
          echo "release-minor=$release_minor"
          echo "release-patch=$release_patch"
          echo "release-sha=$release_sha"
          echo "release-upload-url=$release_upload_url"
          echo "pr-number=$pr_number"
        } >> "$GITHUB_OUTPUT"

    - name: Release Summary
      if: always()
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        RELEASE_CREATED: ${{ steps.normalize.outputs.release-created }}
        TAG_NAME: ${{ steps.normalize.outputs.release-tag }}
        RELEASE_ID: ${{ steps.normalize.outputs.release-id }}
        RELEASE_SHA: ${{ steps.normalize.outputs.release-sha }}
        PR_NUMBER: ${{ steps.normalize.outputs.pr-number }}
        REPO: ${{ github.repository }}
        RELEASE_TYPE: ${{ inputs.release-type }}
      run: |
        set -euo pipefail
        echo "### 📦 Release Management" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$RELEASE_CREATED" == "true" ]]; then
          echo "✅ **Release Created**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $TAG_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Release ID:** $RELEASE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** $RELEASE_SHA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          RELEASE_URL="https://github.com/$REPO/releases/tag/$TAG_NAME"
          echo "[View Release]($RELEASE_URL)" >> $GITHUB_STEP_SUMMARY
        elif [[ -n "$PR_NUMBER" ]]; then
          echo "📝 **Release PR Updated**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number:** #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PR_URL="https://github.com/$REPO/pull/$PR_NUMBER"
          echo "[View PR]($PR_URL)" >> $GITHUB_STEP_SUMMARY
        else
          echo "ℹ️ **No Release**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No release was created. This is normal if:" >> $GITHUB_STEP_SUMMARY
          echo "- No releasable commits since last release" >> $GITHUB_STEP_SUMMARY
          if [[ "$STRATEGY" == "release-please" ]]; then
            echo "- Release PR is still open and not merged" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release Type:** $RELEASE_TYPE" >> $GITHUB_STEP_SUMMARY
        echo "**Strategy:** $STRATEGY" >> $GITHUB_STEP_SUMMARY
