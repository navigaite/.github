---
name: Deploy to Coolify
description: Trigger deployment on a Coolify instance via webhook or API

inputs:
  coolify-url:
    description: Coolify instance URL (e.g., https://coolify.example.com)
    required: true

  coolify-token:
    description: Coolify API token
    required: true

  application-uuid:
    description: Coolify application UUID to deploy
    required: true

  environment:
    description: Deployment environment name (for GitHub deployment status)
    required: false
    default: production

  wait-for-deployment:
    description: Wait for deployment to complete
    required: false
    default: 'true'

  wait-timeout:
    description: Max seconds to wait for deployment (default 300 = 5 min)
    required: false
    default: '300'

  force-rebuild:
    description: Force a full rebuild (no cache)
    required: false
    default: 'false'

outputs:
  deployment-url:
    description: URL of the deployed application
    value: ${{ steps.deploy.outputs.deployment-url }}

  deployment-status:
    description: Final deployment status
    value: ${{ steps.deploy.outputs.deployment-status }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        COOLIFY_URL: ${{ inputs.coolify-url }}
      run: |
        set -euo pipefail
        if [[ ! "$COOLIFY_URL" =~ ^https?:// ]]; then
          echo "::error::Invalid coolify-url '$COOLIFY_URL'. Must start with http:// or https://"; exit 1
        fi

    - name: Trigger Coolify Deployment
      id: deploy
      shell: bash
      env:
        COOLIFY_URL: ${{ inputs.coolify-url }}
        COOLIFY_TOKEN: ${{ inputs.coolify-token }}
        APP_UUID: ${{ inputs.application-uuid }}
        FORCE_REBUILD: ${{ inputs.force-rebuild }}
        WAIT: ${{ inputs.wait-for-deployment }}
        TIMEOUT: ${{ inputs.wait-timeout }}
      run: |
        set -euo pipefail
        echo "::group::🚀 Triggering Coolify Deployment"

        # Trigger deployment via Coolify API
        DEPLOY_RESPONSE=$(curl -sf \
          -X POST \
          -H "Authorization: Bearer $COOLIFY_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"force\": $FORCE_REBUILD}" \
          "$COOLIFY_URL/api/v1/applications/$APP_UUID/restart" \
          2>&1) || {
          echo "::error::Failed to trigger Coolify deployment." \
            "Verify coolify-url is reachable, coolify-token is valid, and application-uuid exists." \
            "API response: $DEPLOY_RESPONSE"
          exit 1
        }

        echo "Deployment triggered successfully"

        if [[ "$WAIT" == "true" ]]; then
          echo "Waiting for deployment to complete (timeout: ${TIMEOUT}s)..."
          ELAPSED=0
          INTERVAL=10

          while [[ $ELAPSED -lt $TIMEOUT ]]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # Check application status
            STATUS_RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_URL/api/v1/applications/$APP_UUID" \
              2>&1) || continue

            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // "unknown"')
            FQDN=$(echo "$STATUS_RESPONSE" | jq -r '.fqdn // ""')

            echo "  [$ELAPSED/${TIMEOUT}s] Status: $STATUS"

            if [[ "$STATUS" == "running" ]]; then
              echo "deployment-status=success" >> $GITHUB_OUTPUT
              echo "deployment-url=$FQDN" >> $GITHUB_OUTPUT
              echo "✅ Deployment successful: $FQDN"
              echo "::endgroup::"
              exit 0
            elif [[ "$STATUS" == "exited" || "$STATUS" == "error" ]]; then
              echo "deployment-status=failure" >> $GITHUB_OUTPUT
              echo "::error::Deployment failed with status '$STATUS'." \
                "Check application logs in Coolify at $COOLIFY_URL for details"
              echo "::endgroup::"
              exit 1
            fi
          done

          echo "deployment-status=timeout" >> $GITHUB_OUTPUT
          echo "::warning::Deployment did not complete within ${TIMEOUT}s"
        else
          echo "deployment-status=triggered" >> $GITHUB_OUTPUT
          echo "Deployment triggered, not waiting for completion"
        fi

        echo "::endgroup::"

    - name: Deployment Summary
      if: always()
      shell: bash
      env:
        DEPLOY_STATUS: ${{ steps.deploy.outputs.deployment-status }}
        DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail
        case "$DEPLOY_STATUS" in
          success)  STATUS_DISPLAY="✅ Deployed" ;;
          failure)  STATUS_DISPLAY="❌ Failed" ;;
          timeout)  STATUS_DISPLAY="⏱️ Timed out" ;;
          triggered) STATUS_DISPLAY="🔄 Triggered" ;;
          *)        STATUS_DISPLAY="❓ Unknown" ;;
        esac

        {
          echo "### 🚀 Coolify Deployment"
          echo ""
          echo "| | |"
          echo "|:---|:---|"
          echo "| **Status** | $STATUS_DISPLAY |"
          echo "| **Environment** | \`$ENVIRONMENT\` |"
          if [[ "$DEPLOY_STATUS" == "success" && -n "$DEPLOY_URL" ]]; then
            echo "| **URL** | [$DEPLOY_URL]($DEPLOY_URL) |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
