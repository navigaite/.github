---
name: Run Build
description: Build project for any tech stack

inputs:
  stack:
    description: Tech stack (nodejs, python, flutter)
    required: true

  build-command:
    description: Custom build command
    required: false
    default: ''

  working-directory:
    description: Working directory
    required: false
    default: .

  upload-artifacts:
    description: Upload build artifacts
    required: false
    default: 'false'

  artifact-name:
    description: Name for the build artifact
    required: false
    default: build-output

  artifact-path:
    description: Path to build output (auto-detected if not specified)
    required: false
    default: ''

  attest-artifacts:
    description: Generate SLSA build provenance attestation for uploaded artifacts
    required: false
    default: 'false'

  artifact-retention-days:
    description: Number of days to retain build artifacts
    required: false
    default: '7'

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        case "$STACK" in
          nodejs|python|flutter) ;;
          *) echo "::error::Invalid stack '$STACK'. Must be one of: nodejs, python, flutter"; exit 1 ;;
        esac
        if [[ "$WORKING_DIR" == *".."* ]] || [[ "$WORKING_DIR" == /* ]] \
          || [[ "$WORKING_DIR" == \\* ]] || [[ "$WORKING_DIR" == //* ]] \
          || [[ "$WORKING_DIR" =~ ^[A-Za-z]:[\\/] ]]; then
          echo "::error::Invalid working-directory '$WORKING_DIR'. Must be a relative path without '..'"; exit 1
        fi

    - name: Detect Turborepo
      id: detect-turbo
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # Turbo config usually lives at the repo root; for single-package setups it may instead
        # live at the caller's working-directory. Check both so monorepo callers that set a
        # subpackage as working-directory still get cache enabled.
        if [[ -f "$WORKING_DIR/turbo.json" ]] || [[ -f "$WORKING_DIR/turbo.jsonc" ]] \
           || [[ -f "$GITHUB_WORKSPACE/turbo.json" ]] || [[ -f "$GITHUB_WORKSPACE/turbo.jsonc" ]]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Detected turbo.json — turbo cache will be restored/saved across runs."
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore Turbo Cache
      if: steps.detect-turbo.outputs.enabled == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        # Turbo 2.x writes local cache to .turbo/cache at the turbo root (typically the repo root);
        # turbo 1.x used node_modules/.cache/turbo in the package directory. Cover both locations
        # (workspace root and working-directory) so either layout hits; non-existent paths are
        # skipped silently.
        # Key: scope saves to the branch being built (head_ref on PRs, ref_name on push) so PR runs
        # can't poison the target branch's cache namespace. restore-keys lets PRs inherit the
        # target branch's cache (github.base_ref) without writing into it.
        path: |
          ${{ github.workspace }}/.turbo/cache
          ${{ inputs.working-directory }}/.turbo/cache
          ${{ inputs.working-directory }}/node_modules/.cache/turbo
        key: turbo-build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
        restore-keys: |
          turbo-build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
          turbo-build-${{ runner.os }}-${{ github.base_ref }}-
          turbo-tests-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
          turbo-tests-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
          turbo-tests-${{ runner.os }}-${{ github.base_ref }}-
          turbo-build-${{ runner.os }}-
          turbo-tests-${{ runner.os }}-
          turbo-${{ runner.os }}-

    - name: Run Build
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STACK: ${{ inputs.stack }}
        CUSTOM_CMD: ${{ inputs.build-command }}
      run: |
        set -euo pipefail
        echo "::group::🏗️ Running Build"

        # Use custom command if provided
        if [[ -n "$CUSTOM_CMD" ]]; then
          echo "Using custom build command: $CUSTOM_CMD"
          bash -c "$CUSTOM_CMD"
        else
          # Auto-detect and run appropriate build
          case "$STACK" in
            nodejs)
              if command -v jq &> /dev/null && [[ -f "package.json" ]]; then
                HAS_BUILD=$(jq -r '.scripts.build // empty' package.json)

                if [[ -n "$HAS_BUILD" ]]; then
                  echo "Running npm run build..."
                  npm run build
                else
                  echo "::warning::No build script found in package.json, skipping build"
                fi
              fi
              ;;

            python)
              # Python typically doesn't have a build step, but check for setup.py or pyproject.toml
              if [[ -f "setup.py" ]]; then
                echo "Building Python package..."
                python setup.py build
              elif [[ -f "pyproject.toml" ]] && command -v poetry &> /dev/null; then
                echo "Building with poetry..."
                poetry build
              else
                echo "::notice::No build configuration found, Python projects typically don't require a build step"
              fi
              ;;

            flutter)
              echo "Building Flutter app..."
              # Build for all platforms (can be customized in build-command)
              if [[ -f "pubspec.yaml" ]]; then
                echo "Building Flutter web..."
                flutter build web
              fi
              ;;

            *)
              echo "::error::Unknown tech stack: $STACK"
              exit 1
              ;;
          esac
        fi

        echo "✅ Build completed successfully"
        echo "::endgroup::"

    - name: Save Turbo Cache
      if: always() && steps.detect-turbo.outputs.enabled == 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ github.workspace }}/.turbo/cache
          ${{ inputs.working-directory }}/.turbo/cache
          ${{ inputs.working-directory }}/node_modules/.cache/turbo
        key: turbo-build-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ github.sha }}

    - name: Detect Build Output
      if: inputs.upload-artifacts == 'true' && inputs.artifact-path == ''
      id: detect-output
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STACK: ${{ inputs.stack }}
      run: |
        set -euo pipefail
        OUTPUT_PATH=""

        case "$STACK" in
          nodejs)
            # Common Next.js, Vite, or React build outputs
            if [[ -d ".next" ]]; then
              OUTPUT_PATH=".next"
            elif [[ -d "dist" ]]; then
              OUTPUT_PATH="dist"
            elif [[ -d "build" ]]; then
              OUTPUT_PATH="build"
            elif [[ -d "out" ]]; then
              OUTPUT_PATH="out"
            fi
            ;;
          python)
            if [[ -d "dist" ]]; then
              OUTPUT_PATH="dist"
            elif [[ -d "build" ]]; then
              OUTPUT_PATH="build"
            fi
            ;;
          flutter)
            if [[ -d "build/web" ]]; then
              OUTPUT_PATH="build/web"
            elif [[ -d "build" ]]; then
              OUTPUT_PATH="build"
            fi
            ;;
        esac

        echo "output-path=$OUTPUT_PATH" >> $GITHUB_OUTPUT
        echo "Detected build output: $OUTPUT_PATH"

    - name: Upload Build Artifacts
      if:
        inputs.upload-artifacts == 'true' && (inputs.artifact-path != '' || steps.detect-output.outputs.output-path !=
        '')
      id: upload
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.artifact-name }}
        path: >-
          ${{ inputs.working-directory }}/${{
            inputs.artifact-path != ''
            && inputs.artifact-path
            || steps.detect-output.outputs.output-path
          }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn

    - name: Attest Build Provenance
      if:
        inputs.upload-artifacts == 'true' && inputs.attest-artifacts == 'true' && steps.upload.outputs.artifact-digest
        != ''
      uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
      continue-on-error: true # Don't break pipelines without OIDC token
      with:
        subject-name: ${{ inputs.artifact-name }}
        subject-digest: ${{ steps.upload.outputs.artifact-digest }}

    - name: Build Summary
      if: always()
      shell: bash
      env:
        BUILD_OUTCOME: ${{ steps.build.outcome }}
        STACK: ${{ inputs.stack }}
        WORKING_DIR: ${{ inputs.working-directory }}
        UPLOAD_ARTIFACTS: ${{ inputs.upload-artifacts }}
      run: |
        set -euo pipefail
        if [[ "$BUILD_OUTCOME" == "success" ]]; then
          STATUS_ICON="✅"; STATUS_LABEL="Success"
        elif [[ "$BUILD_OUTCOME" == "failure" ]]; then
          STATUS_ICON="❌"; STATUS_LABEL="Failed"
        else
          STATUS_ICON="⏭️"; STATUS_LABEL="Skipped"
        fi

        ARTIFACTS_STATUS=$([[ "$UPLOAD_ARTIFACTS" == "true" ]] && echo "✅ Uploaded" || echo "⏭️ Skipped")

        {
          echo "### 🏗️ Build"
          echo ""
          echo "| | |"
          echo "|:---|:---|"
          echo "| **Status** | $STATUS_ICON $STATUS_LABEL |"
          echo "| **Stack** | \`$STACK\` |"
          echo "| **Working Directory** | \`$WORKING_DIR\` |"
          echo "| **Artifacts** | $ARTIFACTS_STATUS |"
        } >> "$GITHUB_STEP_SUMMARY"
