---
name: Security Scan
description: Comprehensive security scanning including secrets detection and dependency vulnerabilities

inputs:
  enable-trufflehog:
    description: Enable TruffleHog secret scanning
    required: false
    default: 'true'

  enable-dependency-review:
    description: Enable dependency vulnerability scanning (PR only)
    required: false
    default: 'true'

  trufflehog-extra-args:
    description: Extra arguments for TruffleHog
    required: false
    default: --only-verified

  fail-on-secrets:
    description: Fail the workflow if secrets are found
    required: false
    default: 'true'

  fail-on-vulnerabilities:
    description: Fail the workflow if vulnerabilities are found
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: TruffleHog Secret Scanning
      id: trufflehog-scan
      if: |
        inputs.enable-trufflehog == 'true' &&
        (
          github.event_name != 'push' ||
          (github.event.before != github.sha && github.event.before != '0000000000000000000000000000000000000000')
        )
      uses: trufflesecurity/trufflehog@7c0734f987ad0bb30ee8da210773b800ee2016d3 # v3.93.4
      with:
        path: ./
        base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        extra_args: ${{ inputs.trufflehog-extra-args }}

    - name: TruffleHog Full Scan (Initial Push)
      id: trufflehog-initial
      if: |
        inputs.enable-trufflehog == 'true' &&
        github.event_name == 'push' &&
        (github.event.before == github.sha || github.event.before == '0000000000000000000000000000000000000000')
      uses: trufflesecurity/trufflehog@7c0734f987ad0bb30ee8da210773b800ee2016d3 # v3.93.4
      with:
        path: ./
        extra_args: --since-commit=HEAD~10 ${{ inputs.trufflehog-extra-args }}

    - name: Check TruffleHog Results
      if: inputs.enable-trufflehog == 'true' && inputs.fail-on-secrets == 'true'
      shell: bash
      env:
        TRUFFLEHOG_OUTCOME: ${{ steps.trufflehog-scan.outcome }}
        TRUFFLEHOG_INITIAL_OUTCOME: ${{ steps.trufflehog-initial.outcome }}
      run: |
        set -euo pipefail
        echo "::group::🔍 TruffleHog Secret Scan Results"
        if [[ "$TRUFFLEHOG_OUTCOME" == "failure" ]] || [[ "$TRUFFLEHOG_INITIAL_OUTCOME" == "failure" ]]; then
          echo "::error::TruffleHog detected secrets in the codebase"
          {
            echo "### ⚠️ Security Alert: Secrets Detected"
            echo ""
            echo "TruffleHog has detected potential secrets in your code."
            echo "Please review the findings above and remove any sensitive data."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
        else
          echo "✅ No secrets detected"
        fi
        echo "::endgroup::"

    - name: Dependency Vulnerability Scan (PR only)
      id: dependency_review
      if: inputs.enable-dependency-review == 'true' && github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/dependency-review-action@9129d7d40b8c12c1ed0f60400d00c92d437adcce # v4.1.3
      with:
        fail-on-severity: ${{ inputs.fail-on-vulnerabilities == 'true' && 'moderate' || 'critical' }}
        comment-summary-in-pr: true
        warn-only: ${{ inputs.fail-on-vulnerabilities != 'true' }}

    - name: Security Summary
      shell: bash
      env:
        ENABLE_TRUFFLEHOG: ${{ inputs.enable-trufflehog }}
        ENABLE_DEP_REVIEW: ${{ inputs.enable-dependency-review }}
        EVENT_NAME: ${{ github.event_name }}
        DEP_REVIEW_OUTCOME: ${{ steps.dependency_review.outcome }}
      run: |
        set -euo pipefail
        TRUFFLEHOG=$([[ "$ENABLE_TRUFFLEHOG" == "true" ]] \
          && echo "✅ Clean" \
          || echo "⏭️ Skipped")
        DEP_CHECK=$([[ "$ENABLE_DEP_REVIEW" == "true" \
          && "$EVENT_NAME" == "pull_request" ]] \
          && echo "true" \
          || echo "false")
        if [[ "$DEP_CHECK" != "true" ]]; then
          DEP_REVIEW="⏭️ Skipped (push event)"
        elif [[ "$DEP_REVIEW_OUTCOME" == "success" ]]; then
          DEP_REVIEW="✅ Passed"
        elif [[ "$DEP_REVIEW_OUTCOME" == "failure" ]]; then
          DEP_REVIEW="⚠️ Unsupported or blocked"
        else
          DEP_REVIEW="⏭️ Skipped"
        fi
        {
          echo "### 🔒 Security Scan"
          echo ""
          echo "| Check | Status |"
          echo "|:---|:---|"
          echo "| 🔍 TruffleHog | $TRUFFLEHOG |"
          echo "| 📦 Dependency Review | $DEP_REVIEW |"
        } >> "$GITHUB_STEP_SUMMARY"
