---
name: Build Executable
description: Build a standalone executable from a Python project using PyInstaller

inputs:
  spec-file:
    description: Path to PyInstaller .spec file
    required: false
    default: ''

  entry-point:
    description: Python entry point file (used if no spec file provided)
    required: false
    default: ''

  executable-name:
    description: Name for the output executable
    required: true

  python-version:
    description: Python version to use
    required: false
    default: '3.12'

  extra-pip-packages:
    description: Additional pip packages to install (space-separated)
    required: false
    default: ''

  working-directory:
    description: Working directory
    required: false
    default: .

  upload-artifact:
    description: Upload the executable as a GitHub artifact
    required: false
    default: 'true'

  artifact-name:
    description: Name for the uploaded artifact (default auto-detected from OS)
    required: false
    default: ''

  pyinstaller-args:
    description: Extra arguments to pass to PyInstaller (only used without spec file)
    required: false
    default: '--onefile'

outputs:
  executable-path:
    description: Path to the built executable
    value: ${{ steps.build.outputs.executable-path }}

  artifact-name:
    description: Name of the uploaded artifact
    value: ${{ steps.resolve.outputs.artifact-name }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [[ "$WORKING_DIR" == *".."* ]] || [[ "$WORKING_DIR" == /* ]] \
          || [[ "$WORKING_DIR" == \\* ]] || [[ "$WORKING_DIR" == //* ]] \
          || [[ "$WORKING_DIR" =~ ^[A-Za-z]:[\\/] ]]; then
          echo "::error::Invalid working-directory '$WORKING_DIR'. Must be a relative path without '..'"; exit 1
        fi

    - name: Resolve Configuration
      id: resolve
      shell: bash
      env:
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUT_EXECUTABLE_NAME: ${{ inputs.executable-name }}
      run: |
        set -euo pipefail
        # Auto-detect artifact name from OS if not specified
        if [[ -n "$INPUT_ARTIFACT_NAME" ]]; then
          echo "artifact-name=$INPUT_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
        else
          case "$RUNNER_OS" in
            macOS)   echo "artifact-name=${INPUT_EXECUTABLE_NAME}-macos" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "artifact-name=${INPUT_EXECUTABLE_NAME}-windows" >> "$GITHUB_OUTPUT" ;;
            Linux)   echo "artifact-name=${INPUT_EXECUTABLE_NAME}-linux" >> "$GITHUB_OUTPUT" ;;
            *)       echo "artifact-name=${INPUT_EXECUTABLE_NAME}" >> "$GITHUB_OUTPUT" ;;
          esac
        fi

    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Project & PyInstaller
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-pip-packages }}
      run: |
        set -euo pipefail
        echo "::group::📦 Installing dependencies"
        python -m pip install --upgrade pip
        pip install pyinstaller

        # Install the project itself
        if [[ -f "pyproject.toml" ]] || [[ -f "setup.py" ]]; then
          pip install -e .
        elif [[ -f "requirements.txt" ]]; then
          pip install -r requirements.txt
        fi

        # Install extra packages if specified
        if [[ -n "$EXTRA_PACKAGES" ]]; then
          pip install $EXTRA_PACKAGES
        fi

        echo "::endgroup::"

    - name: Build Executable
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SPEC_FILE: ${{ inputs.spec-file }}
        ENTRY_POINT: ${{ inputs.entry-point }}
        EXECUTABLE_NAME: ${{ inputs.executable-name }}
        PYINSTALLER_ARGS: ${{ inputs.pyinstaller-args }}
      run: |
        set -euo pipefail
        echo "::group::🏗️ Building executable"

        if [[ -n "$SPEC_FILE" ]]; then
          echo "Building from spec file: $SPEC_FILE"
          pyinstaller "$SPEC_FILE" --noconfirm
        elif [[ -n "$ENTRY_POINT" ]]; then
          echo "Building from entry point: $ENTRY_POINT"
          pyinstaller $PYINSTALLER_ARGS --name "$EXECUTABLE_NAME" "$ENTRY_POINT" --noconfirm
        else
          echo "::error::Either spec-file or entry-point must be provided"
          exit 1
        fi

        # Determine executable path
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          EXE_PATH="dist/${EXECUTABLE_NAME}.exe"
        else
          EXE_PATH="dist/${EXECUTABLE_NAME}"
        fi

        if [[ ! -f "$EXE_PATH" ]]; then
          echo "::error::Expected executable not found at $EXE_PATH"
          ls -la dist/
          exit 1
        fi

        echo "executable-path=$EXE_PATH" >> "$GITHUB_OUTPUT"
        echo "✅ Built: $EXE_PATH ($(du -h "$EXE_PATH" | cut -f1))"
        echo "::endgroup::"

    - name: Test Executable
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        EXE_PATH: ${{ steps.build.outputs.executable-path }}
      run: |
        set -euo pipefail
        echo "::group::🧪 Testing executable"
        ./"$EXE_PATH" --version || ./"$EXE_PATH" --help || echo "::warning::Could not verify executable"
        echo "::endgroup::"

    - name: Upload Artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ steps.resolve.outputs.artifact-name }}
        path: ${{ inputs.working-directory }}/${{ steps.build.outputs.executable-path }}
        retention-days: 30

    - name: Build Summary
      if: always()
      shell: bash
      env:
        BUILD_OUTCOME: ${{ steps.build.outcome }}
        EXECUTABLE_NAME: ${{ inputs.executable-name }}
        EXE_PATH: ${{ steps.build.outputs.executable-path }}
        ARTIFACT_NAME: ${{ steps.resolve.outputs.artifact-name }}
      run: |
        set -euo pipefail
        echo "### 📦 Executable Build" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [[ "$BUILD_OUTCOME" == "success" ]]; then
          echo "✅ **Status:** Success" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "❌ **Status:** Failed" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "- **Executable:** \`$EXECUTABLE_NAME\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Platform:** $RUNNER_OS ($RUNNER_ARCH)" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Artifact:** \`$ARTIFACT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
