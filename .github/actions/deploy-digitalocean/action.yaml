---
name: Deploy to DigitalOcean App Platform
description: Deploy application to DigitalOcean App Platform

inputs:
  digitalocean-token:
    description: DigitalOcean API token
    required: true

  app-name:
    description: DigitalOcean App Platform app name
    required: false
    default: ""

  app-spec-location:
    description: Path to app spec file
    required: false
    default: .do/app.yaml

  environment:
    description: Deployment environment (preview, staging, production)
    required: true

  is-pr-preview:
    description: Deploy as PR preview
    required: false
    default: "false"

  print-build-logs:
    description: Print build logs
    required: false
    default: "true"

  print-deploy-logs:
    description: Print deploy logs
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail
        case "${ENVIRONMENT,,}" in
          preview|staging|production|development) ;;
          *) echo "::error::Invalid environment '$ENVIRONMENT'. Must be one of: preview, staging, production, development"; exit 1 ;;
        esac

    - name: Deploy to DigitalOcean App Platform
      id: deploy
      uses: digitalocean/app_action/deploy@f4c57e650e1dec6665ad5d3af739b67b9d31aab1 # v2.0.10
      with:
        token: ${{ inputs.digitalocean-token }}
        app_name: ${{ inputs.app-name }}
        app_spec_location: ${{ inputs.app-spec-location }}
        deploy_pr_preview: ${{ inputs.is-pr-preview }}
        print_build_logs: ${{ inputs.print-build-logs }}
        print_deploy_logs: ${{ inputs.print-deploy-logs }}

    - name: Deployment Summary
      if: always()
      shell: bash
      env:
        APP_NAME: ${{ inputs.app-name }}
        ENVIRONMENT: ${{ inputs.environment }}
        IS_PR_PREVIEW: ${{ inputs.is-pr-preview }}
        DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
      run: |
        set -euo pipefail
        STATUS=$([[ "$DEPLOY_OUTCOME" == "success" ]] && echo "✅ Success" || echo "❌ Failed")
        {
          echo "### 🚀 DigitalOcean Deployment"
          echo ""
          echo "| | |"
          echo "|:---|:---|"
          echo "| **App** | \`${APP_NAME}\` |"
          echo "| **Environment** | \`${ENVIRONMENT}\` |"
          echo "| **PR Preview** | \`${IS_PR_PREVIEW}\` |"
          echo "| **Status** | ${STATUS} |"
        } >> "$GITHUB_STEP_SUMMARY"

outputs:
  deployment-url:
    description: The URL of the deployment
    value: ${{ steps.deploy.outputs.url }}
