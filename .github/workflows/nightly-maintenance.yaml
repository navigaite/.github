---
name: 🗓️ Weekly Maintenance

on:
  workflow_call: {}
  schedule:
    # Run weekly on Monday at 2 AM UTC. Daily was wasteful — Trivy finds
    # the same vulnerabilities every run on repos that don't change daily,
    # and the 7-day cache TTL means we only need to sweep once a week.
    # Consumers that genuinely need daily sweeps can override via
    # workflow_call with their own schedule.
    - cron: '0 2 * * 1'
  workflow_dispatch: {} # Allow manual triggering

permissions: {}

jobs:
  cleanup-workflow-runs:
    name: 🧹 Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs older than 30 days
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

  cleanup-caches:
    name: 🗑️ Cleanup Old Caches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cleanup old caches
        run: |
          set -euo pipefail
          echo "::group::🔍 Listing caches"
          gh cache list --limit 100
          echo "::endgroup::"

          echo "::group::🗑️ Deleting caches older than 7 days"
          gh cache list --limit 100 --json id,key,createdAt \
            | jq -r '.[] | select(.createdAt < (now - 604800 | todate)) | .id' \
            | xargs -I {} gh cache delete {} || true
          echo "::endgroup::"

          echo "✅ Cache cleanup completed"
        env:
          GH_TOKEN: ${{ github.token }}

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Check Trivy SARIF output
        id: trivy-output
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "trivy-results.sarif" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Trivy did not produce trivy-results.sarif; skipping SARIF upload."
          fi

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        if: always() && steps.trivy-output.outputs.exists == 'true'
        with:
          sarif_file: trivy-results.sarif

      - name: Security Audit Summary
        if: always()
        shell: bash
        env:
          TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
          HAS_SARIF: ${{ steps.trivy-output.outputs.exists }}
        run: |
          set -euo pipefail
          echo "### 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Step | $TRIVY_OUTCOME |" >> $GITHUB_STEP_SUMMARY
          echo "| SARIF Produced | $HAS_SARIF |" >> $GITHUB_STEP_SUMMARY

  lint-workflows:
    name: 🔍 Lint Workflow Definitions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar xzf /tmp/actionlint.tar.gz -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color || true
          echo "### 🔍 Workflow Lint" >> "$GITHUB_STEP_SUMMARY"
          ERRORS=$(actionlint -format '{{range $err := .}}{{$err}}\n{{end}}' 2>&1 || true)
          if [[ -z "$ERRORS" ]]; then
            echo "✅ All workflows pass actionlint" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ actionlint found issues:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$ERRORS" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  maintenance-summary:
    name: 📊 Maintenance Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs:
      - cleanup-workflow-runs
      - cleanup-caches
      - security-audit
      - lint-workflows
    if: always()
    steps:
      - name: Generate summary
        env:
          RESULT_CLEANUP_WORKFLOWS: ${{ needs.cleanup-workflow-runs.result }}
          RESULT_CLEANUP_CACHES: ${{ needs.cleanup-caches.result }}
          RESULT_SECURITY_AUDIT: ${{ needs.security-audit.result }}
          RESULT_LINT_WORKFLOWS: ${{ needs.lint-workflows.result }}
        run: |
          set -euo pipefail
          echo "### 🗓️ Weekly Maintenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Cleanup | $RESULT_CLEANUP_WORKFLOWS |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Cleanup | $RESULT_CLEANUP_CACHES |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | $RESULT_SECURITY_AUDIT |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Lint | $RESULT_LINT_WORKFLOWS |" >> $GITHUB_STEP_SUMMARY
