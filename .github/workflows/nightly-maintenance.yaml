---
name: 🌙 Nightly Maintenance

on:
  workflow_call: {}
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: {} # Allow manual triggering

permissions: {}

jobs:
  cleanup-workflow-runs:
    name: 🧹 Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs older than 30 days
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7 # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

  cleanup-caches:
    name: 🗑️ Cleanup Old Caches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Cleanup old caches
        run: |
          echo "::group::🔍 Listing caches"
          gh cache list --limit 100
          echo "::endgroup::"

          echo "::group::🗑️ Deleting caches older than 7 days"
          gh cache list --limit 100 --json id,key,createdAt \
            | jq -r '.[] | select(.createdAt < (now - 604800 | todate)) | .id' \
            | xargs -I {} gh cache delete {} || true
          echo "::endgroup::"

          echo "✅ Cache cleanup completed"
        env:
          GH_TOKEN: ${{ github.token }}

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # 0.34.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Check Trivy SARIF output
        id: trivy-output
        shell: bash
        run: |
          if [[ -f "trivy-results.sarif" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Trivy did not produce trivy-results.sarif; skipping SARIF upload."
          fi

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@f4193927db07ae6f5e5940c26794da08f7b41291 # v4.33.2
        if: always() && steps.trivy-output.outputs.exists == 'true'
        with:
          sarif_file: trivy-results.sarif

      - name: Security Audit Summary
        if: always()
        shell: bash
        env:
          TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
          HAS_SARIF: ${{ steps.trivy-output.outputs.exists }}
        run: |
          echo "### 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Step | $TRIVY_OUTCOME |" >> $GITHUB_STEP_SUMMARY
          echo "| SARIF Produced | $HAS_SARIF |" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    name: 📦 Dependency Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check for outdated dependencies
        run: |
          echo "### 📦 Dependency Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for package.json
          if [[ -f "package.json" ]]; then
            echo "#### Node.js Dependencies" >> $GITHUB_STEP_SUMMARY
            npm outdated || true
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Check for requirements.txt
          if [[ -f "requirements.txt" ]]; then
            echo "#### Python Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "Run \`pip list --outdated\` to check for updates" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "✅ Dependency check completed"

  maintenance-summary:
    name: 📊 Maintenance Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: [cleanup-workflow-runs, cleanup-caches, security-audit, dependency-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "### 🌙 Nightly Maintenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Cleanup | ${{ needs.cleanup-workflow-runs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Cleanup | ${{ needs.cleanup-caches.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
