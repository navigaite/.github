---
name: Test Actions
on:
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint Workflow Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar xzf /tmp/actionlint.tar.gz -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  validate-inputs:
    name: Test Input Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        action:
          - name: install-dependencies
            inputs: '{"stack": "invalid", "package-manager": "npm"}'
          - name: run-lint
            inputs: '{"stack": "invalid"}'
          - name: run-build
            inputs: '{"stack": "invalid"}'
          - name: run-tests
            inputs: '{"stack": "invalid"}'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Test that invalid stack is rejected
        id: test-invalid
        continue-on-error: true
        uses: ./.github/actions/${{ matrix.action.name }}
        with: ${{ fromJSON(matrix.action.inputs) }}
      - name: Assert failure
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.test-invalid.outcome }}" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid input but got: ${{ steps.test-invalid.outcome }}"
            exit 1
          fi
          echo "✅ Action correctly rejected invalid input"

  validate-path-traversal:
    name: Test Path Traversal Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Test path traversal is rejected
        id: test-traversal
        continue-on-error: true
        uses: ./.github/actions/run-build
        with:
          stack: nodejs
          working-directory: '../../etc'
      - name: Assert failure
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.test-traversal.outcome }}" != "failure" ]]; then
            echo "::error::Expected path traversal to be rejected"
            exit 1
          fi
          echo "✅ Path traversal correctly rejected"
