---
name: Test Actions
on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint Workflow Definitions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar xzf /tmp/actionlint.tar.gz -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  validate-install-dependencies:
    name: Test install-dependencies rejects invalid stack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test that invalid stack is rejected
        id: test-invalid
        continue-on-error: true
        uses: ./.github/actions/install-dependencies
        with:
          stack: invalid
          package-manager: npm
      - name: Assert failure
        shell: bash
        env:
          OUTCOME: ${{ steps.test-invalid.outcome }}
        run: |
          set -euo pipefail
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid input but got: $OUTCOME"
            exit 1
          fi
          echo "✅ Action correctly rejected invalid input"

  validate-run-lint:
    name: Test run-lint rejects invalid stack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test that invalid stack is rejected
        id: test-invalid
        continue-on-error: true
        uses: ./.github/actions/run-lint
        with:
          stack: invalid
      - name: Assert failure
        shell: bash
        env:
          OUTCOME: ${{ steps.test-invalid.outcome }}
        run: |
          set -euo pipefail
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid input but got: $OUTCOME"
            exit 1
          fi
          echo "✅ Action correctly rejected invalid input"

  validate-run-build:
    name: Test run-build rejects invalid stack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test that invalid stack is rejected
        id: test-invalid
        continue-on-error: true
        uses: ./.github/actions/run-build
        with:
          stack: invalid
      - name: Assert failure
        shell: bash
        env:
          OUTCOME: ${{ steps.test-invalid.outcome }}
        run: |
          set -euo pipefail
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid input but got: $OUTCOME"
            exit 1
          fi
          echo "✅ Action correctly rejected invalid input"

  validate-run-tests:
    name: Test run-tests rejects invalid stack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test that invalid stack is rejected
        id: test-invalid
        continue-on-error: true
        uses: ./.github/actions/run-tests
        with:
          stack: invalid
      - name: Assert failure
        shell: bash
        env:
          OUTCOME: ${{ steps.test-invalid.outcome }}
        run: |
          set -euo pipefail
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected action to fail with invalid input but got: $OUTCOME"
            exit 1
          fi
          echo "✅ Action correctly rejected invalid input"

  validate-path-traversal:
    name: Test Path Traversal Protection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test path traversal is rejected
        id: test-traversal
        continue-on-error: true
        uses: ./.github/actions/run-build
        with:
          stack: nodejs
          working-directory: "../../etc"
      - name: Assert failure
        shell: bash
        env:
          OUTCOME: ${{ steps.test-traversal.outcome }}
        run: |
          set -euo pipefail
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected path traversal to be rejected"
            exit 1
          fi
          echo "✅ Path traversal correctly rejected"
