---
name: Release

run-name: "Release | ${{ github.actor }}"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

jobs:
  release-please:
    name: 📦 Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-version: ${{ steps.release.outputs.version }}
      release-major: ${{ steps.release.outputs.major }}
      release-minor: ${{ steps.release.outputs.minor }}
      release-patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔍 Check for GitHub App secrets
        id: check-app
        shell: bash
        env:
          APP_ID: ${{ secrets.WORKFLOW_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$APP_ID" && -n "$APP_PRIVATE_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            missing=()
            [[ -z "$APP_ID" ]] && missing+=("WORKFLOW_APP_ID")
            [[ -z "$APP_PRIVATE_KEY" ]] && missing+=("WORKFLOW_APP_PRIVATE_KEY")
            echo "::warning::${missing[*]} not set — falling back to GITHUB_TOKEN. Auto-merged PRs won't trigger follow-up workflows."
          fi

      - name: 🔑 Generate GitHub App token
        id: app-token
        if: steps.check-app.outputs.available == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📦 Run Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 🤖 Enable auto-merge on release PR
        if: steps.release.outputs.release_created != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_OUTPUT: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          # Try release-please pr output first (JSON or plain number)
          pr_number=""
          if [[ -n "$PR_OUTPUT" ]]; then
            if [[ "$PR_OUTPUT" =~ ^\{ ]]; then
              pr_number=$(echo "$PR_OUTPUT" | jq -r '.number // empty')
            elif [[ "$PR_OUTPUT" =~ ^[0-9]+$ ]]; then
              pr_number="$PR_OUTPUT"
            fi
          fi

          # Fallback: find open release PR by label
          if [[ -z "$pr_number" ]]; then
            pr_number=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          fi

          if [[ -n "$pr_number" && "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Enabling auto-merge for release PR #${pr_number}"
            if ! gh pr merge "$pr_number" --squash --auto; then
              echo "::warning::Could not enable auto-merge for release PR #${pr_number}; continuing without failing the workflow."
            fi
          else
            echo "No open release PR found."
          fi

  update-major-tag:
    name: 🏷️ Update Major Version Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    steps:
      - name: 🔍 Check for GitHub App secrets
        id: check-app
        shell: bash
        env:
          APP_ID: ${{ secrets.WORKFLOW_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$APP_ID" && -n "$APP_PRIVATE_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub App secrets not set — tag updates may fail due to tag protection rules."
          fi

      - name: 🔑 Generate GitHub App token
        id: app-token
        if: steps.check-app.outputs.available == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: 🏷️ Update rolling tags
        shell: bash
        env:
          MAJOR: ${{ needs.release-please.outputs.release-major }}
          TAG: ${{ needs.release-please.outputs.release-tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for ROLLING_TAG in "v${MAJOR}" "latest"; do
            echo "Updating ${ROLLING_TAG} to point to ${TAG}"
            git tag -f "${ROLLING_TAG}" "${TAG}"
            git push --force origin "refs/tags/${ROLLING_TAG}"
            echo "✅ ${ROLLING_TAG} → ${TAG}"
          done

      - name: 📋 Summary
        shell: bash
        env:
          MAJOR: ${{ needs.release-please.outputs.release-major }}
          TAG: ${{ needs.release-please.outputs.release-tag }}
          VERSION: ${{ needs.release-please.outputs.release-version }}
        run: |
          set -euo pipefail
          {
            echo "### 🏷️ Release Published"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Version** | \`${VERSION}\` |"
            echo "| **Tag** | \`${TAG}\` |"
            echo "| **Major Tag** | \`v${MAJOR}\` → \`${TAG}\` |"
            echo "| **Latest Tag** | \`latest\` → \`${TAG}\` |"
            echo ""
            echo "Consumers using \`@v${MAJOR}\` or \`@latest\` will now get \`${TAG}\`."
          } >> "$GITHUB_STEP_SUMMARY"
