---
# The org-level "Protected branches" ruleset requires these check names on all
# repos: "Navigaite CI/CD Pipeline / 🧹 Lint", "... / 🧪 Test", "... / 🏗️ Build",
# and "Branch Guard".
#
# This infra repo has no app code to lint/test/build.  The jobs below satisfy
# the required check names so auto-merge and branch protection work.  Actual
# validation happens in test-actions.yaml (actionlint + action input tests).
name: Navigaite CI/CD

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-guard:
    name: Branch Guard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "ℹ️  Infra repo — no branch guard needed"

  lint:
    name: Navigaite CI/CD Pipeline / 🧹 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "ℹ️  Linting handled by test-actions.yaml (actionlint)"

  test:
    name: Navigaite CI/CD Pipeline / 🧪 Test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "ℹ️  Tests handled by test-actions.yaml (action validation)"

  build:
    name: Navigaite CI/CD Pipeline / 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "ℹ️  Infra repo — no build step needed"
