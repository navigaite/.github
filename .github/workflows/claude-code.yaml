---
name: 🤖 Claude Code

# Reusable workflow that runs Claude Code Action on PRs and comments.
# Consumer repos call this from their own workflow with the appropriate triggers.
#
# Example consumer workflow:
#
#   on:
#     pull_request_review:
#       types: [submitted]
#     pull_request_review_comment:
#       types: [created]
#     issue_comment:
#       types: [created]
#
#   jobs:
#     claude:
#       # Review branch: permissive `contains(login, 'copilot')` because
#       # exact-match on 'copilot-pull-request-reviewer[bot]' was observed
#       # to silently skip in production (2026-04). Tightened by requiring
#       # user.type == 'Bot' so a human account with "copilot" in the login
#       # cannot trigger a privileged workflow.
#       #
#       # Comment branches: gate on the `@claude` keyword AND on
#       # author_association so untrusted commenters cannot trigger runs.
#       # The `navigaite-workflow-app[bot]` OR-branch lets the reusable
#       # workflow's own `repost-copilot-review` step (below) re-fire
#       # Claude via a synthesized `@claude` comment when the original
#       # trigger was a Copilot review — `claude-code-action@v1`'s
#       # `checkHumanActor` calls `users.getByUsername('Copilot')`
#       # which 404s (Copilot is a virtual actor with no user record),
#       # so we proxy the review into a normal comment event.
#       if: >-
#         (github.event_name == 'pull_request_review' &&
#           github.event.review.user.type == 'Bot' &&
#           contains(github.event.review.user.login, 'copilot')) ||
#         (github.event_name == 'pull_request_review_comment' &&
#           contains(github.event.comment.body, '@claude') &&
#           contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
#                    github.event.comment.author_association)) ||
#         (github.event_name == 'issue_comment' &&
#           github.event.issue.pull_request &&
#           contains(github.event.comment.body, '@claude') &&
#           (contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
#                     github.event.comment.author_association) ||
#            github.event.comment.user.login == 'navigaite-workflow-app[bot]'))
#       permissions:
#         contents: write
#         pull-requests: write
#         issues: write
#         id-token: write          # required for claude-code-action OIDC
#       uses: navigaite/.github/.github/workflows/claude-code.yaml@v2
#       secrets: inherit

on:
  workflow_call:
    inputs:
      trigger_phrase:
        description: Phrase that activates Claude in comments (default @claude)
        required: false
        type: string
        default: '@claude'

      allowed_bots:
        description: >-
          Comma-separated bot logins whose comments trigger Claude.
          Use '"*"' (quoted) to allow all bots. Empty string blocks all bots.
          Default is '"*"' because exact-match on
          'copilot-pull-request-reviewer[bot]' was observed to silently skip
          in production (2026-04). This input governs only the
          claude-code-action's internal bot-author filter for comment-based
          triggers — callers are expected to gate `pull_request_review` via
          their own `if:` (e.g. `user.type == 'Bot'` +
          `contains(login, 'copilot')`) and gate comment-based triggers
          with an `author_association` check. See the example at the top
          of this file.
        required: false
        type: string
        default: '*'

      timeout_minutes:
        description: Maximum minutes before the job is cancelled
        required: false
        type: number
        default: 30

    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: OAuth token for Claude Code authentication
        required: true
      WORKFLOW_APP_ID:
        description: >-
          GitHub App ID used to mint an installation token when the
          workflow is triggered by a bot (e.g. Copilot PR reviews). The
          default Claude OIDC token-exchange path fails with 401 for bot
          actors because the backend checks the triggering actor's repo
          write access. Optional; falls back to GITHUB_TOKEN if unset.
        required: false
      WORKFLOW_APP_PRIVATE_KEY:
        description: Private key paired with WORKFLOW_APP_ID. Optional.
        required: false

permissions: {}

# Collapse rapid-fire @claude invocations on the same PR into the latest
# request. Without this, every comment spawns a fresh run that can burn
# up to `timeout_minutes` of Claude API tokens in parallel — a noisy PR
# thread can rack up $10-50/month of wasted spend plus Actions minutes.
#
# `cancel-in-progress: true` — "replace with latest" semantics. If a user
# sends a follow-up `@claude` before the previous run finishes, cancel
# the older run and work on the new request. For queue-instead-of-replace
# semantics, flip this to `false`.
#
# Group key is namespaced with caller repo + caller workflow name to
# avoid collisions across workflows or consumer repos that happen to use
# the same base key. Falls back from pull_request.number (review /
# review_comment events) to issue.number (issue_comment events) to
# github.ref (manual dispatch, workflow_call without a PR context) so
# every event shape resolves to a stable group.
concurrency:
  group: claude-code-${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Copilot PR reviews cannot run claude-code-action directly: its
  # `checkHumanActor` step calls `octokit.users.getByUsername('Copilot')`
  # which 404s (Copilot is a virtual actor with no user record). No
  # action input bypasses that lookup — see
  # src/github/validation/actor.ts and upstream PRs #1018 / #1030 / #1144.
  #
  # Workaround: mint our GitHub App token, fetch the Copilot review + its
  # inline comments, and post them as a single synthesized `@claude`
  # issue comment on the PR. The `issue_comment` trigger fires a new
  # run where `github.actor == 'navigaite-workflow-app[bot]'` — a real
  # bot user that resolves — and `checkHumanActor`'s `allowed_bots: *`
  # branch takes over.
  repost-copilot-review:
    name: 🔁 Repost Copilot review as @claude comment
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.user.type == 'Bot' &&
      contains(github.event.review.user.login, 'copilot')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write     # post the @claude issue comment
    steps:
      - name: 🔍 Require app secrets
        shell: bash
        env:
          APP_ID: ${{ secrets.WORKFLOW_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$APP_ID" || -z "$APP_PRIVATE_KEY" ]]; then
            echo "::error::WORKFLOW_APP_ID/WORKFLOW_APP_PRIVATE_KEY required to repost Copilot reviews."
            exit 1
          fi

      - name: 🔑 Mint app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📤 Post review as @claude comment
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          REVIEW_URL: ${{ github.event.review.html_url }}
        run: |
          set -euo pipefail

          # Minimal trigger comment — Claude has gh/GitHub MCP access and
          # can fetch the review body and inline comments itself. Dumping
          # them into the comment body just duplicates content that lives
          # one click away on the same PR.
          jq -n \
            --arg user "$REVIEW_USER" \
            --arg url "$REVIEW_URL" \
            '{body: ("@claude **" + $user + "** [submitted a review](" + $url + "). Please fetch the review + inline comments, address valid suggestions, and reply to any that do not apply.")}' \
            | gh api "repos/${REPO}/issues/${PR}/comments" --input -

          echo "::notice::Reposted Copilot review from ${REVIEW_USER} as @claude comment on PR #${PR}."

  claude:
    name: 🤖 Claude Code
    # Copilot PR reviews are handled by `repost-copilot-review` above —
    # skip the direct claude-code-action path here to avoid the 404 on
    # `users.getByUsername('Copilot')`. The repost job triggers a fresh
    # `issue_comment` run that lands here via the trusted-bot branch.
    if: >-
      !(github.event_name == 'pull_request_review' &&
        github.event.review.user.type == 'Bot' &&
        contains(github.event.review.user.login, 'copilot'))
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write          # required: claude-code-action fetches an OIDC token
    steps:
      - name: Diagnose trigger
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          {
            echo "### Claude Code trigger"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| event_name | \`${EVENT_NAME}\` |"
            echo "| review.user.login | \`${REVIEW_USER}\` |"
            echo "| review.state | \`${REVIEW_STATE}\` |"
            echo "| comment.user.login | \`${COMMENT_USER}\` |"
            echo "| actor | \`${ACTOR}\` |"
            echo "| triggering_actor | \`${TRIGGERING_ACTOR}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Bypass the MEMBER/OWNER/COLLABORATOR gate for comments posted by
      # our own GitHub App — that's how `repost-copilot-review` re-enters
      # Claude after a Copilot review (the app's comments have
      # `author_association: NONE` but are trusted by construction since
      # only the installed app can mint its own token).
      - name: Check author association
        if: >-
          github.event_name == 'issue_comment' &&
          !contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association) &&
          github.event.comment.user.login != 'navigaite-workflow-app[bot]'
        shell: bash
        env:
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          echo "::notice::Ignoring comment from non-member (association: ${AUTHOR_ASSOCIATION})"
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: >-
            ${{
              (github.event_name == 'pull_request_review' ||
               github.event_name == 'pull_request_review_comment')
              && github.event.pull_request.head.sha
              || (github.event_name == 'issue_comment' && github.event.issue.pull_request
                  && format('refs/pull/{0}/head', github.event.issue.number))
              || github.sha
            }}
          fetch-depth: 1

      # claude-code-action's default auth path exchanges an OIDC token with
      # Anthropic's backend for a Claude App installation token. That exchange
      # verifies `github.triggering_actor` has write access to the repo, which
      # fails with 401 for bot actors (e.g. Copilot PR reviews) because bots
      # are not collaborators. When the trigger is a bot, mint a GitHub App
      # token from the Navigaite workflow App instead and pass it via
      # `github_token` to bypass the OIDC exchange entirely.
      - name: 🔍 Check for GitHub App secrets
        id: check-app
        if: github.event.review.user.type == 'Bot'
        shell: bash
        env:
          APP_ID: ${{ secrets.WORKFLOW_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$APP_ID" && -n "$APP_PRIVATE_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WORKFLOW_APP_ID/WORKFLOW_APP_PRIVATE_KEY not set — falling back to GITHUB_TOKEN for bot-triggered run."
          fi

      - name: 🔑 Mint app token (bypass OIDC for bot-triggered runs)
        id: app-token
        if: steps.check-app.outputs.available == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      # For bot-triggered pull_request_review events (e.g. Copilot reviews),
      # craft a prompt so the action runs in automation mode. Without a
      # prompt, the action stays in interactive mode and looks for the
      # trigger_phrase (@claude) in the review body — which bot reviews
      # never contain, causing "No trigger found, skipping remaining steps".
      - name: Craft bot-review prompt
        id: review-prompt
        if: >-
          github.event_name == 'pull_request_review' &&
          github.event.review.user.type == 'Bot'
        shell: bash
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo 'A code reviewer has submitted a review on this pull request.'
            echo 'Review the PR changes and all of the reviewer'\''s comments (both top-level and inline).'
            echo 'Address valid suggestions by making code changes.'
            echo 'If a suggestion does not apply, reply to the comment explaining why.'
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        with:
          trigger_phrase: ${{ inputs.trigger_phrase }}
          allowed_bots: ${{ inputs.allowed_bots }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # For bot reviews, supply the crafted prompt so the action enters
          # automation mode instead of waiting for a trigger_phrase match.
          prompt: ${{ steps.review-prompt.outputs.prompt || '' }}
          # Only override github_token for bot-triggered runs. Human triggers
          # continue through the default OIDC exchange so commits carry the
          # `claude[bot]` identity.
          github_token: >-
            ${{
              github.event.review.user.type == 'Bot'
              && (steps.app-token.outputs.token || secrets.GITHUB_TOKEN)
              || ''
            }}
          # claude-code-action's checkWritePermissions auto-allows actors
          # whose login ends with `[bot]`, but Copilot PR reviews run as
          # `github.actor == 'Copilot'` (no suffix) and the subsequent
          # `getCollaboratorPermissionLevel` call 404s with "Copilot is not
          # a user". Whitelist Copilot for bot-triggered runs only; human
          # triggers keep the default (empty) so the normal write-permission
          # check still applies. Requires `github_token` to be set — see
          # claude-code-action src/github/validation/permissions.ts.
          allowed_non_write_users: >-
            ${{
              github.event.review.user.type == 'Bot'
              && 'Copilot'
              || ''
            }}
