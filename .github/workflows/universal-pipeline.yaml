---
name: Navigaite CI/CD
# Reusable workflow that provides a complete CI/CD pipeline for any tech stack
# Call this workflow from your project's workflow file

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to pipeline configuration file
        required: false
        type: string
        default: .github/pipeline.yaml

      working-directory:
        description: Working directory for all operations
        required: false
        type: string
        default: .

      # Override options (bypass config file)
      stack:
        description: Force specific tech stack (overrides config and auto-detection)
        required: false
        type: string
        default: ''

      skip-security:
        description: Skip security scanning
        required: false
        type: boolean
        default: false

      skip-lint:
        description: Skip linting
        required: false
        type: boolean
        default: false

      skip-test:
        description: Skip tests
        required: false
        type: boolean
        default: false

      skip-build:
        description: Skip build
        required: false
        type: boolean
        default: false

      skip-deploy:
        description: Skip deployment
        required: false
        type: boolean
        default: false

    outputs:
      release-created:
        description: Whether a release was created
        value: ${{ jobs.release.outputs.release-created }}
      release-version:
        description: Release version (without v prefix)
        value: ${{ jobs.release.outputs.release-version }}
      release-tag:
        description: Release tag (with v prefix)
        value: ${{ jobs.release.outputs.release-tag }}

    secrets:
      # Vercel secrets
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false

      # DigitalOcean secrets
      DIGITALOCEAN_TOKEN:
        required: false

      # Docker registry secrets
      DOCKER_REGISTRY_USERNAME:
        required: false
      DOCKER_REGISTRY_PASSWORD:
        required: false

      # GitHub token (for deployments and release-please).
      # Prefer passing WORKFLOW_APP_ID + WORKFLOW_APP_PRIVATE_KEY so the reusable
      # workflow can mint an installation token in-job — release-please pushes
      # authenticated with a cross-job-passed token are stripped by GitHub
      # (masked outputs), which silently falls back to GITHUB_TOKEN and breaks
      # downstream workflow triggering on release PRs.
      GH_TOKEN:
        required: false

      # GitHub App credentials for minting installation tokens in-job.
      # When both are set, release + sync steps push with the app token so that
      # downstream workflows (e.g. the pipeline itself on the release PR) fire.
      WORKFLOW_APP_ID:
        required: false
      WORKFLOW_APP_PRIVATE_KEY:
        required: false

      # Infisical Universal Auth for loading secrets at build-time
      INFISICAL_CLIENT_ID:
        required: false
      INFISICAL_CLIENT_SECRET:
        required: false
      INFISICAL_PROJECT_SLUG:
        required: false
      INFISICAL_ENV_SLUG:
        required: false
      INFISICAL_DOMAIN:
        required: false
      INFISICAL_SECRET_PATH:
        required: false

# NOTE: Calling workflows must grant the permissions each job actually uses:
#   setup:     contents: read
#   security:  contents: read, pull-requests: write
#   lint/test: contents: read
#   build:     contents: read, id-token: write, attestations: write
#   deploy:    contents: read, deployments: write, pull-requests: write, packages: write, id-token: write
#   release:   contents: write, pull-requests: write, id-token: write
#   sync:      contents: write, pull-requests: write
permissions: {}

concurrency:
  group: ${{ github.repository }}-pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # =============================================================================
  # CONFIGURATION & SETUP
  # =============================================================================
  setup:
    name: 🔧 Setup & Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      # Tech stack detection
      stack: ${{ steps.setup-env.outputs.detected-stack }}
      runtime-version: ${{ steps.setup-env.outputs.runtime-version }}
      package-manager: ${{ steps.setup-env.outputs.package-manager }}
      enable-caching: ${{ steps.parse-config.outputs.enable-caching }}

      # Pipeline configuration
      enable-security: ${{ steps.parse-config.outputs.enable-security }}
      enable-trufflehog: ${{ steps.parse-config.outputs.enable-trufflehog }}
      enable-dependency-review: ${{ steps.parse-config.outputs.enable-dependency-review }}
      security-fail-on-secrets: ${{ steps.parse-config.outputs.security-fail-on-secrets }}
      security-fail-on-vulnerabilities: ${{ steps.parse-config.outputs.security-fail-on-vulnerabilities }}
      enable-lint: ${{ steps.parse-config.outputs.enable-lint }}
      lint-command: ${{ steps.parse-config.outputs.lint-command }}
      lint-fail-on-error: ${{ steps.parse-config.outputs.lint-fail-on-error }}
      enable-test: ${{ steps.parse-config.outputs.enable-test }}
      test-command: ${{ steps.parse-config.outputs.test-command }}
      test-coverage: ${{ steps.parse-config.outputs.test-coverage }}
      enable-build: ${{ steps.parse-config.outputs.enable-build }}
      build-command: ${{ steps.parse-config.outputs.build-command }}
      build-upload-artifacts: ${{ steps.parse-config.outputs.build-upload-artifacts }}
      build-artifact-name: ${{ steps.parse-config.outputs.build-artifact-name }}
      build-artifact-path: ${{ steps.parse-config.outputs.build-artifact-path }}
      build-attest-artifacts: ${{ steps.parse-config.outputs.build-attest-artifacts }}
      build-artifact-retention-days: ${{ steps.parse-config.outputs.build-artifact-retention-days }}
      enable-deploy: ${{ steps.parse-config.outputs.enable-deploy }}
      enable-release: ${{ steps.parse-config.outputs.enable-release }}

      # Deployment configuration
      deploy-provider: ${{ steps.parse-config.outputs.deploy-provider }}
      deploy-environments: ${{ steps.parse-config.outputs.deploy-environments }}
      docker-images: ${{ steps.parse-config.outputs.docker-images }}
      vercel-scope: ${{ steps.parse-config.outputs.vercel-scope }}
      vercel-build-command: ${{ steps.parse-config.outputs.vercel-build-command }}
      digitalocean-app-name: ${{ steps.parse-config.outputs.digitalocean-app-name }}
      digitalocean-app-spec: ${{ steps.parse-config.outputs.digitalocean-app-spec }}
      digitalocean-print-build-logs: ${{ steps.parse-config.outputs.digitalocean-print-build-logs }}
      digitalocean-print-deploy-logs: ${{ steps.parse-config.outputs.digitalocean-print-deploy-logs }}

      # Release configuration
      enable-sync: ${{ steps.parse-config.outputs.enable-sync }}
      sync-target-branch: ${{ steps.parse-config.outputs.sync-target-branch }}
      release-strategy: ${{ steps.parse-config.outputs.release-strategy }}
      release-type: ${{ steps.parse-config.outputs.release-type }}
      release-force-patch-on-no-release: ${{ steps.parse-config.outputs.release-force-patch-on-no-release }}
      release-extra-plugins: ${{ steps.parse-config.outputs.release-extra-plugins }}
      prerelease-branches: ${{ steps.parse-config.outputs.prerelease-branches }}
      release-config-file: ${{ steps.parse-config.outputs.release-config-file }}
      release-config-file-stable: ${{ steps.parse-config.outputs.release-config-file-stable }}
      release-manifest-file: ${{ steps.parse-config.outputs.release-manifest-file }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📋 Parse Configuration
        id: parse-config
        shell: bash
        env:
          CONFIG_FILE: ${{ inputs.config-file }}
          SKIP_SECURITY: ${{ inputs.skip-security }}
          SKIP_LINT: ${{ inputs.skip-lint }}
          SKIP_TEST: ${{ inputs.skip-test }}
          SKIP_BUILD: ${{ inputs.skip-build }}
          SKIP_DEPLOY: ${{ inputs.skip-deploy }}
        run: |
          set -euo pipefail
          echo "::group::📋 Parsing Pipeline Configuration"

          # Check if config file exists
          if [[ ! -f "$CONFIG_FILE" ]]; then
            echo "::warning::Configuration file not found at $CONFIG_FILE, using defaults"

            # Set sensible defaults
            CONFIGURED_STACK="auto"
            ENABLE_CACHING="true"
            RUNTIME_NODE_VERSION=""
            RUNTIME_PYTHON_VERSION=""
            RUNTIME_FLUTTER_VERSION=""
            ENABLE_SECURITY="true"
            ENABLE_TRUFFLEHOG="true"
            ENABLE_DEPENDENCY_REVIEW="true"
            SECURITY_FAIL_ON_SECRETS="true"
            SECURITY_FAIL_ON_VULNERABILITIES="false"
            ENABLE_LINT="true"
            LINT_COMMAND=""
            LINT_FAIL_ON_ERROR="true"
            ENABLE_TEST="true"
            TEST_COMMAND=""
            TEST_COVERAGE="false"
            ENABLE_BUILD="true"
            BUILD_COMMAND=""
            BUILD_UPLOAD_ARTIFACTS="false"
            BUILD_ARTIFACT_NAME="build-output"
            BUILD_ARTIFACT_PATH=""
            BUILD_ATTEST_ARTIFACTS="false"
            BUILD_ARTIFACT_RETENTION_DAYS="7"
            DEPLOY_PROVIDER="none"
            ENABLE_DEPLOY="false"
            DEPLOY_ENVS="[]"
            DOCKER_IMAGES="[]"
            VERCEL_SCOPE=""
            VERCEL_BUILD_COMMAND=""
            DIGITALOCEAN_APP_NAME=""
            DIGITALOCEAN_APP_SPEC=".do/app.yaml"
            DIGITALOCEAN_PRINT_BUILD_LOGS="true"
            DIGITALOCEAN_PRINT_DEPLOY_LOGS="true"
            ENABLE_RELEASE="false"
            ENABLE_SYNC="true"
            SYNC_TARGET="dev"
            RELEASE_STRATEGY="release-please"
            RELEASE_TYPE=""
            RELEASE_FORCE_PATCH_NO_RELEASE="false"
            RELEASE_EXTRA_PLUGINS=""
            PRERELEASE_BRANCHES="[]"
            RP_CONFIG_FILE=""
            RP_CONFIG_FILE_STABLE=""
            RP_MANIFEST_FILE=""
          else
            echo "✓ Found configuration file: $CONFIG_FILE"

            command -v yq >/dev/null || {
              echo "::error::yq is required to parse $CONFIG_FILE"
              exit 1
            }
            command -v jq >/dev/null || {
              echo "::error::jq is required to parse $CONFIG_FILE"
              exit 1
            }

            # Parse configuration using yq
            CONFIGURED_STACK=$(yq -r '.stack // "auto"' "$CONFIG_FILE")
            ENABLE_CACHING=$(yq '.pipeline.enable_caching // true' "$CONFIG_FILE")
            RUNTIME_NODE_VERSION=$(yq -r '.runtime.node_version // ""' "$CONFIG_FILE")
            RUNTIME_PYTHON_VERSION=$(yq -r '.runtime.python_version // ""' "$CONFIG_FILE")
            RUNTIME_FLUTTER_VERSION=$(yq -r '.runtime.flutter_version // ""' "$CONFIG_FILE")
            ENABLE_SECURITY=$(yq '.security.enable // true' "$CONFIG_FILE")
            ENABLE_TRUFFLEHOG=$(yq '.security.trufflehog // true' "$CONFIG_FILE")
            ENABLE_DEPENDENCY_REVIEW=$(yq '.security.dependency_review // true' "$CONFIG_FILE")
            SECURITY_FAIL_ON_SECRETS=$(yq '.security.fail_on_secrets // true' "$CONFIG_FILE")
            SECURITY_FAIL_ON_VULNERABILITIES=$(yq '.security.fail_on_vulnerabilities // false' "$CONFIG_FILE")
            ENABLE_LINT=$(yq '.lint.enable // true' "$CONFIG_FILE")
            LINT_COMMAND=$(yq -r '.lint.command // ""' "$CONFIG_FILE")
            LINT_FAIL_ON_ERROR=$(yq '.lint.fail_on_error // true' "$CONFIG_FILE")
            ENABLE_TEST=$(yq '.test.enable // true' "$CONFIG_FILE")
            TEST_COMMAND=$(yq -r '.test.command // ""' "$CONFIG_FILE")
            TEST_COVERAGE=$(yq '.test.coverage // false' "$CONFIG_FILE")
            ENABLE_BUILD=$(yq '.build.enable // true' "$CONFIG_FILE")
            BUILD_COMMAND=$(yq -r '.build.command // ""' "$CONFIG_FILE")
            BUILD_UPLOAD_ARTIFACTS=$(yq '.build.upload_artifacts // false' "$CONFIG_FILE")
            BUILD_ARTIFACT_NAME=$(yq -r '.build.artifact_name // "build-output"' "$CONFIG_FILE")
            BUILD_ARTIFACT_PATH=$(yq -r '.build.artifact_path // ""' "$CONFIG_FILE")
            BUILD_ATTEST_ARTIFACTS=$(yq '.build.attest_artifacts // false' "$CONFIG_FILE")
            BUILD_ARTIFACT_RETENTION_DAYS=$(yq -r '.build.artifact_retention_days // "7"' "$CONFIG_FILE")
            DEPLOY_PROVIDER=$(yq '.deployment.provider // "none"' "$CONFIG_FILE")
            ENABLE_DEPLOY=$([ "$DEPLOY_PROVIDER" != "none" ] && echo "true" || echo "false")
            VERCEL_SCOPE=$(yq -r '.deployment.vercel.scope // ""' "$CONFIG_FILE")
            VERCEL_BUILD_COMMAND=$(yq -r '.deployment.vercel.build_command // ""' "$CONFIG_FILE")
            DIGITALOCEAN_APP_NAME=$(yq -r '.deployment.digitalocean.app_name // ""' "$CONFIG_FILE")
            DIGITALOCEAN_APP_SPEC=$(yq -r '.deployment.digitalocean.app_spec // ".do/app.yaml"' "$CONFIG_FILE")
            DIGITALOCEAN_PRINT_BUILD_LOGS=$(yq '.deployment.digitalocean.print_logs // true' "$CONFIG_FILE")
            DIGITALOCEAN_PRINT_DEPLOY_LOGS="$DIGITALOCEAN_PRINT_BUILD_LOGS"
            ENABLE_RELEASE=$(yq '.release.enable // false' "$CONFIG_FILE")
            RELEASE_STRATEGY=$(yq '.release.strategy // "release-please"' "$CONFIG_FILE")
            RELEASE_TYPE=$(yq -r '.release.type // ""' "$CONFIG_FILE")
            RELEASE_FORCE_PATCH_NO_RELEASE=$(yq -r '.release.force_patch_on_no_release // ""' "$CONFIG_FILE")
            if [[ -z "$RELEASE_FORCE_PATCH_NO_RELEASE" || "$RELEASE_FORCE_PATCH_NO_RELEASE" == "null" ]]; then
              if [[ "$RELEASE_STRATEGY" == "semantic-release" ]]; then
                RELEASE_FORCE_PATCH_NO_RELEASE="true"
              else
                RELEASE_FORCE_PATCH_NO_RELEASE="false"
              fi
            fi

            # Extract extra semantic-release plugins (newline-separated list)
            RELEASE_EXTRA_PLUGINS=$(yq -r '(.release.extra_plugins // []) | join("\n")' "$CONFIG_FILE")

            # Extract release sync configuration
            ENABLE_SYNC=$(yq '.release.sync_to_dev // true' "$CONFIG_FILE")
            SYNC_TARGET=$(yq '.release.sync_target_branch // "dev"' "$CONFIG_FILE")

            # Extract prerelease branch configuration
            PRERELEASE_BRANCHES=$(yq -o=json -I=0 '.release.prerelease_branches // []' "$CONFIG_FILE" | jq -c '.')

            # Extract release-please manifest config file paths
            RP_CONFIG_FILE=$(yq -r '.release.config_file // ""' "$CONFIG_FILE")
            RP_CONFIG_FILE_STABLE=$(yq -r '.release.config_file_stable // ""' "$CONFIG_FILE")
            RP_MANIFEST_FILE=$(yq -r '.release.manifest_file // ""' "$CONFIG_FILE")

            # Validate release strategy
            if [[ "$RELEASE_STRATEGY" != "release-please" && "$RELEASE_STRATEGY" != "semantic-release" ]]; then
              echo "::warning::Invalid release.strategy '$RELEASE_STRATEGY'. Falling back to 'release-please'"
              RELEASE_STRATEGY="release-please"
            fi

            if [[ "$DEPLOY_PROVIDER" != "vercel" && "$DEPLOY_PROVIDER" != "digitalocean" && "$DEPLOY_PROVIDER" != "docker" && "$DEPLOY_PROVIDER" != "none" ]]; then
              echo "::warning::Unsupported deployment.provider '$DEPLOY_PROVIDER'. Falling back to 'none'"
              DEPLOY_PROVIDER="none"
              ENABLE_DEPLOY="false"
            fi

            # Extract deployment environments
            DEPLOY_ENVS=$(yq -o=json '.deployment.environments // []' "$CONFIG_FILE")

            # Filter environments by trigger event + branch (uses .trigger.event / .trigger.branch)
            # Environments without a trigger field are always included
            CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
            DEPLOY_ENVS=$(echo "$DEPLOY_ENVS" | jq -c \
              --arg event "$GITHUB_EVENT_NAME" \
              --arg branch "$CURRENT_BRANCH" \
              '[.[] | select(
                (.auto_deploy // true) == true and
                (.trigger == null or (
                  .trigger.event == $event and
                  (if .trigger.branch then .trigger.branch == $branch else true end) and
                  (if .trigger.branches then (.trigger.branches | index($branch)) != null else true end)
                ))
              )]')

            # Extract Docker image definitions for multi-image builds
            DOCKER_IMAGES=$(yq -o=json -I=0 '.deployment.docker.images // []' "$CONFIG_FILE" | jq -c '.')
            if [[ "$DEPLOY_PROVIDER" == "docker" && "$DOCKER_IMAGES" == "[]" ]]; then
              # Fallback: single image from repo name with default Dockerfile
              DOCKER_IMAGES='[{"name":"default","dockerfile":"Dockerfile"}]'
            fi

          fi

          # Apply input overrides
          [[ "$SKIP_SECURITY" == "true" ]] && ENABLE_SECURITY="false"
          [[ "$SKIP_LINT" == "true" ]] && ENABLE_LINT="false"
          [[ "$SKIP_TEST" == "true" ]] && ENABLE_TEST="false"
          [[ "$SKIP_BUILD" == "true" ]] && ENABLE_BUILD="false"
          [[ "$SKIP_DEPLOY" == "true" ]] && ENABLE_DEPLOY="false"

          # Output configuration
          echo "configured-stack=$CONFIGURED_STACK" >> $GITHUB_OUTPUT
          echo "enable-caching=$ENABLE_CACHING" >> $GITHUB_OUTPUT
          echo "runtime-node-version=$RUNTIME_NODE_VERSION" >> $GITHUB_OUTPUT
          echo "runtime-python-version=$RUNTIME_PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "runtime-flutter-version=$RUNTIME_FLUTTER_VERSION" >> $GITHUB_OUTPUT
          echo "enable-security=$ENABLE_SECURITY" >> $GITHUB_OUTPUT
          echo "enable-trufflehog=$ENABLE_TRUFFLEHOG" >> $GITHUB_OUTPUT
          echo "enable-dependency-review=$ENABLE_DEPENDENCY_REVIEW" >> $GITHUB_OUTPUT
          echo "security-fail-on-secrets=$SECURITY_FAIL_ON_SECRETS" >> $GITHUB_OUTPUT
          echo "security-fail-on-vulnerabilities=$SECURITY_FAIL_ON_VULNERABILITIES" >> $GITHUB_OUTPUT
          echo "enable-lint=$ENABLE_LINT" >> $GITHUB_OUTPUT
          echo "lint-command<<LINT_EOF" >> $GITHUB_OUTPUT
          echo "$LINT_COMMAND" >> $GITHUB_OUTPUT
          echo "LINT_EOF" >> $GITHUB_OUTPUT
          echo "lint-fail-on-error=$LINT_FAIL_ON_ERROR" >> $GITHUB_OUTPUT
          echo "enable-test=$ENABLE_TEST" >> $GITHUB_OUTPUT
          echo "test-command<<TEST_EOF" >> $GITHUB_OUTPUT
          echo "$TEST_COMMAND" >> $GITHUB_OUTPUT
          echo "TEST_EOF" >> $GITHUB_OUTPUT
          echo "test-coverage=$TEST_COVERAGE" >> $GITHUB_OUTPUT
          echo "enable-build=$ENABLE_BUILD" >> $GITHUB_OUTPUT
          echo "build-command<<BUILD_EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_COMMAND" >> $GITHUB_OUTPUT
          echo "BUILD_EOF" >> $GITHUB_OUTPUT
          echo "build-upload-artifacts=$BUILD_UPLOAD_ARTIFACTS" >> $GITHUB_OUTPUT
          echo "build-artifact-name=$BUILD_ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "build-artifact-path=$BUILD_ARTIFACT_PATH" >> $GITHUB_OUTPUT
          echo "build-attest-artifacts=$BUILD_ATTEST_ARTIFACTS" >> $GITHUB_OUTPUT
          echo "build-artifact-retention-days=$BUILD_ARTIFACT_RETENTION_DAYS" >> $GITHUB_OUTPUT
          echo "enable-deploy=$ENABLE_DEPLOY" >> $GITHUB_OUTPUT
          echo "enable-release=$ENABLE_RELEASE" >> $GITHUB_OUTPUT
          echo "deploy-provider=$DEPLOY_PROVIDER" >> $GITHUB_OUTPUT
          echo "deploy-environments=$DEPLOY_ENVS" >> $GITHUB_OUTPUT
          echo "docker-images=$DOCKER_IMAGES" >> $GITHUB_OUTPUT
          echo "vercel-scope=$VERCEL_SCOPE" >> $GITHUB_OUTPUT
          echo "vercel-build-command<<VERCEL_BUILD_EOF" >> $GITHUB_OUTPUT
          echo "$VERCEL_BUILD_COMMAND" >> $GITHUB_OUTPUT
          echo "VERCEL_BUILD_EOF" >> $GITHUB_OUTPUT
          echo "digitalocean-app-name=$DIGITALOCEAN_APP_NAME" >> $GITHUB_OUTPUT
          echo "digitalocean-app-spec=$DIGITALOCEAN_APP_SPEC" >> $GITHUB_OUTPUT
          echo "digitalocean-print-build-logs=$DIGITALOCEAN_PRINT_BUILD_LOGS" >> $GITHUB_OUTPUT
          echo "digitalocean-print-deploy-logs=$DIGITALOCEAN_PRINT_DEPLOY_LOGS" >> $GITHUB_OUTPUT
          echo "enable-sync=$ENABLE_SYNC" >> $GITHUB_OUTPUT
          echo "sync-target-branch=$SYNC_TARGET" >> $GITHUB_OUTPUT
          echo "release-strategy=$RELEASE_STRATEGY" >> $GITHUB_OUTPUT
          echo "release-type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "release-force-patch-on-no-release=$RELEASE_FORCE_PATCH_NO_RELEASE" >> $GITHUB_OUTPUT
          echo "release-extra-plugins<<PLUGINS_EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_EXTRA_PLUGINS" >> $GITHUB_OUTPUT
          echo "PLUGINS_EOF" >> $GITHUB_OUTPUT
          echo "prerelease-branches=$PRERELEASE_BRANCHES" >> $GITHUB_OUTPUT
          echo "release-config-file=$RP_CONFIG_FILE" >> $GITHUB_OUTPUT
          echo "release-config-file-stable=$RP_CONFIG_FILE_STABLE" >> $GITHUB_OUTPUT
          echo "release-manifest-file=$RP_MANIFEST_FILE" >> $GITHUB_OUTPUT

          echo ""
          echo "📦 Configuration Summary:"
          echo "  Stack: $CONFIGURED_STACK"
          echo "  Caching: $ENABLE_CACHING"
          echo "  Security: $ENABLE_SECURITY"
          echo "  Lint: $ENABLE_LINT"
          echo "  Test: $ENABLE_TEST"
          echo "  Build: $ENABLE_BUILD"
          echo "  Deploy: $ENABLE_DEPLOY (Provider: $DEPLOY_PROVIDER)"
          echo "  Release: $ENABLE_RELEASE"
          echo "  Release Strategy: $RELEASE_STRATEGY"
          echo "  Release Fallback Patch: $RELEASE_FORCE_PATCH_NO_RELEASE"

          echo "::endgroup::"

      - name: 🔍 Setup Environment
        id: setup-env
        uses: navigaite/.github/.github/actions/setup-environment@v2
        with:
          stack: ${{ inputs.stack != '' && inputs.stack || steps.parse-config.outputs.configured-stack }}
          node-version: ${{ steps.parse-config.outputs.runtime-node-version }}
          python-version: ${{ steps.parse-config.outputs.runtime-python-version }}
          flutter-version: ${{ steps.parse-config.outputs.runtime-flutter-version }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'
          enable-caching: 'false'

      - name: 📊 Pipeline Summary
        shell: bash
        env:
          STACK: ${{ steps.setup-env.outputs.detected-stack }}
          RUNTIME_VERSION: ${{ steps.setup-env.outputs.runtime-version }}
          PKG_MANAGER: ${{ steps.setup-env.outputs.package-manager }}
          ENABLE_SECURITY: ${{ steps.parse-config.outputs.enable-security }}
          ENABLE_LINT: ${{ steps.parse-config.outputs.enable-lint }}
          ENABLE_TEST: ${{ steps.parse-config.outputs.enable-test }}
          ENABLE_BUILD: ${{ steps.parse-config.outputs.enable-build }}
          ENABLE_DEPLOY: ${{ steps.parse-config.outputs.enable-deploy }}
          ENABLE_RELEASE: ${{ steps.parse-config.outputs.enable-release }}
          RELEASE_STRATEGY: ${{ steps.parse-config.outputs.release-strategy }}
          RELEASE_FORCE_PATCH_NO_RELEASE: ${{ steps.parse-config.outputs.release-force-patch-on-no-release }}
        run: |
          set -euo pipefail
          SECURITY=$([[ "$ENABLE_SECURITY" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")
          LINT=$([[ "$ENABLE_LINT" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")
          TEST=$([[ "$ENABLE_TEST" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")
          BUILD=$([[ "$ENABLE_BUILD" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")
          DEPLOY=$([[ "$ENABLE_DEPLOY" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")
          RELEASE=$([[ "$ENABLE_RELEASE" == "true" ]] && echo "✅ Enabled" || echo "⏭️ Skipped")

          {
            echo "## 🚀 Pipeline Overview"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Stack** | \`$STACK\` |"
            echo "| **Runtime** | \`$RUNTIME_VERSION\` |"
            echo "| **Package Manager** | \`$PKG_MANAGER\` |"
            if [[ "$ENABLE_RELEASE" == "true" ]]; then
              echo "| **Release Strategy** | \`$RELEASE_STRATEGY\` |"
              echo "| **Force Patch on No Release** | \`$RELEASE_FORCE_PATCH_NO_RELEASE\` |"
            fi
            echo ""
            echo "---"
            echo ""
            echo "| Stage | Status |"
            echo "|:---|:---|"
            echo "| 🔒 Security Scan | $SECURITY |"
            echo "| 🧹 Lint | $LINT |"
            echo "| 🧪 Test | $TEST |"
            echo "| 🏗️ Build | $BUILD |"
            echo "| 🚀 Deploy | $DEPLOY |"
            echo "| 📦 Release | $RELEASE |"
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # SECURITY SCANNING
  # =============================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    needs: setup
    if: needs.setup.outputs.enable-security == 'true'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Required for TruffleHog

      - name: 🔍 Security Scanning
        uses: navigaite/.github/.github/actions/security-scan@v2
        with:
          enable-trufflehog: ${{ needs.setup.outputs.enable-trufflehog }}
          enable-dependency-review: ${{ needs.setup.outputs.enable-dependency-review }}
          fail-on-secrets: ${{ needs.setup.outputs.security-fail-on-secrets }}
          fail-on-vulnerabilities: ${{ needs.setup.outputs.security-fail-on-vulnerabilities }}

  # =============================================================================
  # LINT
  # =============================================================================
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    needs: setup
    if: needs.setup.outputs.enable-lint == 'true'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Environment
        uses: navigaite/.github/.github/actions/setup-environment@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          node-version: ${{ needs.setup.outputs.runtime-version }}
          python-version: ${{ needs.setup.outputs.runtime-version }}
          flutter-version: ${{ needs.setup.outputs.runtime-version }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'
          enable-caching: ${{ needs.setup.outputs.enable-caching }}

      - name: 📦 Install Dependencies
        uses: navigaite/.github/.github/actions/install-dependencies@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          package-manager: ${{ needs.setup.outputs.package-manager }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'

      - name: 🔍 Detect React Project
        id: detect-react
        if: needs.setup.outputs.stack == 'nodejs'
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_REACT=$(jq -r '((.dependencies // {}) + (.devDependencies // {}) + (.peerDependencies // {})) | has("react")' package.json)
          if [[ "$HAS_REACT" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "✓ React project detected"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Not a React project, skipping React Doctor"
          fi

      - name: 🩺 Run React Doctor (PR)
        id: react-doctor-pr
        if: steps.detect-react.outputs.enabled == 'true' && github.event_name == 'pull_request'
        uses: millionco/react-doctor@87d4b86450008b7aa57bf6b1b556e9f9832d2eaa # main
        continue-on-error: true
        with:
          directory: ${{ inputs.working-directory }}
          diff: ${{ github.base_ref || 'main' }}
          fail-on: none
          verbose: 'false'

      - name: 🩺 Run React Doctor
        id: react-doctor
        if: steps.detect-react.outputs.enabled == 'true' && github.event_name != 'pull_request'
        uses: millionco/react-doctor@87d4b86450008b7aa57bf6b1b556e9f9832d2eaa # main
        continue-on-error: true
        with:
          directory: ${{ inputs.working-directory }}
          fail-on: none
          verbose: 'false'

      - name: 🔍 Detect Trunk Configuration
        id: detect-trunk
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [[ -f ".trunk/trunk.yaml" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🩺 React Doctor Summary
        if: always() && steps.detect-react.outputs.enabled == 'true'
        shell: bash
        env:
          PR_OUTCOME: ${{ steps.react-doctor-pr.outcome }}
          PR_SCORE: ${{ steps.react-doctor-pr.outputs.score }}
          BRANCH_OUTCOME: ${{ steps.react-doctor.outcome }}
          BRANCH_SCORE: ${{ steps.react-doctor.outputs.score }}
        run: |
          set -euo pipefail
          MODE="not run"
          OUTCOME="skipped"
          SCORE="-"

          if [[ -n "$PR_OUTCOME" && "$PR_OUTCOME" != "skipped" ]]; then
            MODE="PR diff scan"
            OUTCOME="$PR_OUTCOME"
            [[ -n "$PR_SCORE" ]] && SCORE="$PR_SCORE"
          elif [[ -n "$BRANCH_OUTCOME" && "$BRANCH_OUTCOME" != "skipped" ]]; then
            MODE="full scan"
            OUTCOME="$BRANCH_OUTCOME"
            [[ -n "$BRANCH_SCORE" ]] && SCORE="$BRANCH_SCORE"
          fi

          STATUS="⏭️ Skipped"
          if [[ "$OUTCOME" == "success" ]]; then
            STATUS="✅ Passed"
          elif [[ "$OUTCOME" == "failure" ]]; then
            STATUS="⚠️ Completed with findings (non-blocking)"
          elif [[ "$OUTCOME" == "cancelled" ]]; then
            STATUS="⚪ Cancelled"
          fi

          {
            echo "### 🩺 React Doctor"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Status** | $STATUS |"
            echo "| **Mode** | $MODE |"
            echo "| **Health Score** | \`$SCORE\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🧹 Run Trunk Lint
        id: trunk-lint
        if: steps.detect-trunk.outputs.enabled == 'true' && inputs.working-directory == '.'
        uses: trunk-io/trunk-action@75699af9e26881e564e9d832ef7dc3af25ec031b # v1.2.4

      - name: 📥 Install Trunk CLI (Subdirectory)
        if: steps.detect-trunk.outputs.enabled == 'true' && inputs.working-directory != '.'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://trunk.io/releases/trunk -o "$RUNNER_TEMP/trunk"
          chmod +x "$RUNNER_TEMP/trunk"

      - name: 🧹 Run Trunk Lint (Subdirectory)
        id: trunk-lint-subdir
        if: steps.detect-trunk.outputs.enabled == 'true' && inputs.working-directory != '.'
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          TRUNK_PATH: ${{ runner.temp }}/trunk
        run: |
          set -euo pipefail
          "$TRUNK_PATH" check --ci

      - name: 🧹 Run Lint
        id: fallback-lint
        if: steps.detect-trunk.outputs.enabled != 'true'
        uses: navigaite/.github/.github/actions/run-lint@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          lint-command: ${{ needs.setup.outputs.lint-command }}
          working-directory: ${{ inputs.working-directory }}
          fail-on-error: ${{ needs.setup.outputs.lint-fail-on-error }}

      - name: 📋 Lint Summary
        if: always()
        shell: bash
        env:
          TRUNK_ENABLED: ${{ steps.detect-trunk.outputs.enabled }}
          TRUNK_OUTCOME: ${{ steps.trunk-lint.outcome }}
          TRUNK_SUBDIR_OUTCOME: ${{ steps.trunk-lint-subdir.outcome }}
          FALLBACK_OUTCOME: ${{ steps.fallback-lint.outcome }}
          REACT_ENABLED: ${{ steps.detect-react.outputs.enabled }}
          RD_PR_OUTCOME: ${{ steps.react-doctor-pr.outcome }}
          RD_OUTCOME: ${{ steps.react-doctor.outcome }}
        run: |
          set -euo pipefail
          LINT_ENGINE="Custom lint action"
          LINT_STATUS="$FALLBACK_OUTCOME"
          if [[ "$TRUNK_ENABLED" == "true" ]]; then
            LINT_ENGINE="Trunk"
            LINT_STATUS="$TRUNK_OUTCOME"
            if [[ -n "$TRUNK_SUBDIR_OUTCOME" && "$TRUNK_SUBDIR_OUTCOME" != "skipped" ]]; then
              LINT_ENGINE="Trunk (subdirectory)"
              LINT_STATUS="$TRUNK_SUBDIR_OUTCOME"
            fi
          fi

          RD_STATUS="not run"
          if [[ "$REACT_ENABLED" == "true" ]]; then
            if [[ -n "$RD_PR_OUTCOME" && "$RD_PR_OUTCOME" != "skipped" ]]; then
              RD_STATUS="$RD_PR_OUTCOME"
            elif [[ -n "$RD_OUTCOME" && "$RD_OUTCOME" != "skipped" ]]; then
              RD_STATUS="$RD_OUTCOME"
            else
              RD_STATUS="skipped"
            fi
          fi

          STATUS_ICON="⏭️"
          STATUS_LABEL="Skipped"
          if [[ "$LINT_STATUS" == "success" ]]; then
            STATUS_ICON="✅"; STATUS_LABEL="Passed"
          elif [[ "$LINT_STATUS" == "failure" ]]; then
            STATUS_ICON="❌"; STATUS_LABEL="Failed"
          fi

          case "$RD_STATUS" in
            success) RD_DISPLAY="✅ Passed" ;;
            failure) RD_DISPLAY="⚠️ Completed with findings" ;;
            "not run") RD_DISPLAY="⏭️ Not a React project" ;;
            skipped|"") RD_DISPLAY="⏭️ Skipped" ;;
            *) RD_DISPLAY="$RD_STATUS" ;;
          esac

          {
            echo "### 🧹 Lint"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Status** | $STATUS_ICON $STATUS_LABEL |"
            echo "| **Engine** | \`$LINT_ENGINE\` |"
            echo "| **React Doctor** | $RD_DISPLAY |"
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # TEST
  # =============================================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: setup
    if: needs.setup.outputs.enable-test == 'true'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Environment
        uses: navigaite/.github/.github/actions/setup-environment@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          node-version: ${{ needs.setup.outputs.runtime-version }}
          python-version: ${{ needs.setup.outputs.runtime-version }}
          flutter-version: ${{ needs.setup.outputs.runtime-version }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'
          enable-caching: ${{ needs.setup.outputs.enable-caching }}

      - name: 📦 Install Dependencies
        uses: navigaite/.github/.github/actions/install-dependencies@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          package-manager: ${{ needs.setup.outputs.package-manager }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'

      - name: 🧪 Run Tests
        uses: navigaite/.github/.github/actions/run-tests@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          test-command: ${{ needs.setup.outputs.test-command }}
          working-directory: ${{ inputs.working-directory }}
          coverage: ${{ needs.setup.outputs.test-coverage }}

  # =============================================================================
  # BUILD
  # =============================================================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # SLSA attestation + OIDC
      attestations: write # SLSA build provenance
    needs: [setup, lint, test]
    if: |
      always() &&
      needs.setup.outputs.enable-build == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Environment
        uses: navigaite/.github/.github/actions/setup-environment@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          node-version: ${{ needs.setup.outputs.runtime-version }}
          python-version: ${{ needs.setup.outputs.runtime-version }}
          flutter-version: ${{ needs.setup.outputs.runtime-version }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'
          enable-caching: ${{ needs.setup.outputs.enable-caching }}

      - name: 📦 Install Dependencies
        uses: navigaite/.github/.github/actions/install-dependencies@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          package-manager: ${{ needs.setup.outputs.package-manager }}
          working-directory: ${{ inputs.working-directory }}
          write-summary: 'false'

      - name: 🔍 Check Infisical Configuration
        id: infisical-config
        shell: bash
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG || secrets.INFISICAL_PROJECT_SLUG }}
          INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG || secrets.INFISICAL_ENV_SLUG }}
        run: |
          set -euo pipefail
          if [[ -n "$INFISICAL_CLIENT_ID" && -n "$INFISICAL_CLIENT_SECRET" && -n "$INFISICAL_PROJECT_SLUG" && -n "$INFISICAL_ENV_SLUG" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Infisical configuration incomplete, skipping secrets injection step"
          fi

      - name: 🔐 Load Infisical Secrets (Universal Auth)
        if: steps.infisical-config.outputs.enabled == 'true'
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058 # v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG || secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || secrets.INFISICAL_ENV_SLUG }}
          domain: ${{ vars.INFISICAL_DOMAIN || secrets.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          secret-path: ${{ vars.INFISICAL_SECRET_PATH || secrets.INFISICAL_SECRET_PATH || '/' }}

      - name: 🏗️ Run Build
        uses: navigaite/.github/.github/actions/run-build@v2
        with:
          stack: ${{ needs.setup.outputs.stack }}
          build-command: ${{ needs.setup.outputs.build-command }}
          working-directory: ${{ inputs.working-directory }}
          upload-artifacts: ${{ needs.setup.outputs.build-upload-artifacts }}
          artifact-name: ${{ needs.setup.outputs.build-artifact-name }}
          artifact-path: ${{ needs.setup.outputs.build-artifact-path }}
          attest-artifacts: ${{ needs.setup.outputs.build-attest-artifacts }}
          artifact-retention-days: ${{ needs.setup.outputs.build-artifact-retention-days }}

  # =============================================================================
  # DEPLOYMENT (Provider-specific jobs to avoid loading unused actions)
  # =============================================================================
  deploy-vercel:
    name: 🚀 Vercel / ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      id-token: write # OIDC for cloud providers
    needs: [setup, build]
    if: |
      always() &&
      needs.setup.outputs.enable-deploy == 'true' &&
      needs.setup.outputs.deploy-provider == 'vercel' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.deploy-environments).*.name }}
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Node Runtime
        if: needs.setup.outputs.stack == 'nodejs'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ needs.setup.outputs.runtime-version }}

      - name: 🔍 Check Infisical Configuration
        id: infisical-config
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ matrix.environment }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG_RAW: ${{ vars.INFISICAL_PROJECT_SLUG || secrets.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail
          case "${DEPLOY_ENVIRONMENT,,}" in
          production) RESOLVED_ENV_SLUG="production" ;;
          *) RESOLVED_ENV_SLUG="preview" ;;
          esac

          if [[ -n "$INFISICAL_CLIENT_ID" && -n "$INFISICAL_CLIENT_SECRET" && -n "$INFISICAL_PROJECT_SLUG_RAW" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "project-slug=$INFISICAL_PROJECT_SLUG_RAW" >> "$GITHUB_OUTPUT"
            echo "env-slug=$RESOLVED_ENV_SLUG" >> "$GITHUB_OUTPUT"
            echo "✅ Infisical deploy env slug: $RESOLVED_ENV_SLUG"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔐 Load Infisical Secrets (Universal Auth)
        if: steps.infisical-config.outputs.enabled == 'true'
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058 # v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ steps.infisical-config.outputs.project-slug }}
          env-slug: ${{ steps.infisical-config.outputs.env-slug }}
          domain: ${{ vars.INFISICAL_DOMAIN || secrets.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          secret-path: ${{ vars.INFISICAL_SECRET_PATH || secrets.INFISICAL_SECRET_PATH || '/' }}

      - name: 🚀 Deploy to Vercel
        uses: navigaite/.github/.github/actions/deploy-vercel@v2
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-scope: ${{ needs.setup.outputs.vercel-scope }}
          environment: ${{ matrix.environment }}
          github-token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          working-directory: ${{ inputs.working-directory }}
          build-command: ${{ needs.setup.outputs.vercel-build-command }}

  deploy-digitalocean:
    name: 🚀 DigitalOcean / ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      id-token: write # OIDC for cloud providers
    needs: [setup, build]
    if: |
      always() &&
      needs.setup.outputs.enable-deploy == 'true' &&
      needs.setup.outputs.deploy-provider == 'digitalocean' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.deploy-environments).*.name }}
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🚀 Deploy to DigitalOcean
        uses: navigaite/.github/.github/actions/deploy-digitalocean@v2
        with:
          digitalocean-token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          app-name:
            ${{ needs.setup.outputs.digitalocean-app-name != '' &&
            needs.setup.outputs.digitalocean-app-name || github.event.repository.name }}
          app-spec-location: ${{ needs.setup.outputs.digitalocean-app-spec }}
          environment: ${{ matrix.environment }}
          is-pr-preview: ${{ matrix.environment == 'preview' && github.event_name == 'pull_request' }}
          print-build-logs: ${{ needs.setup.outputs.digitalocean-print-build-logs }}
          print-deploy-logs: ${{ needs.setup.outputs.digitalocean-print-deploy-logs }}

  deploy-docker:
    name: 🐳 Docker / ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
      packages: write
      id-token: write # OIDC for cloud providers
    needs: [setup, build, release]
    if: |
      always() &&
      needs.setup.outputs.enable-deploy == 'true' &&
      needs.setup.outputs.deploy-provider == 'docker' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    strategy:
      fail-fast: true
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.docker-images) }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔍 Resolve Image Metadata
        id: resolve
        shell: bash
        env:
          REPO: ${{ github.repository }}
          IMAGE_NAME_OVERRIDE: ${{ matrix.image.image_name }}
          IMAGE_SUFFIX: ${{ matrix.image.name }}
          RELEASE_VERSION: ${{ needs.release.outputs.release-version }}
          EXTRA_BUILD_ARGS: ${{ matrix.image.build_args }}
        run: |
          set -euo pipefail
          REPO_LOWER="${REPO,,}"

          # Determine image name: explicit override > repo-suffix > repo name
          if [[ -n "$IMAGE_NAME_OVERRIDE" ]]; then
            IMAGE_NAME="$IMAGE_NAME_OVERRIDE"
          elif [[ -n "$IMAGE_SUFFIX" && "$IMAGE_SUFFIX" != "default" ]]; then
            IMAGE_NAME="${REPO_LOWER}-${IMAGE_SUFFIX}"
          else
            IMAGE_NAME="$REPO_LOWER"
          fi

          # Determine image tag: release version > git sha
          if [[ -n "$RELEASE_VERSION" ]]; then
            IMAGE_TAG="$RELEASE_VERSION"
          else
            IMAGE_TAG="${GITHUB_SHA}"
          fi

          # Build args: always inject APP_VERSION when release version is known
          BUILD_ARGS="${EXTRA_BUILD_ARGS}"
          if [[ -n "$RELEASE_VERSION" ]]; then
            BUILD_ARGS="${BUILD_ARGS:+${BUILD_ARGS}
          }APP_VERSION=${RELEASE_VERSION}"
          fi

          echo "image-name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "build-args<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BUILD_ARGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 🚀 Deploy Docker Image
        uses: navigaite/.github/.github/actions/deploy-docker@v2
        with:
          dockerfile: ${{ matrix.image.dockerfile || 'Dockerfile' }}
          context: ${{ matrix.image.context || '.' }}
          image-name: ${{ steps.resolve.outputs.image-name }}
          image-tag: ${{ steps.resolve.outputs.image-tag }}
          registry: ${{ matrix.image.registry || 'ghcr' }}
          build-args: ${{ steps.resolve.outputs.build-args }}
          platforms: ${{ matrix.image.platforms || 'linux/amd64' }}
          registry-password: ${{ secrets.DOCKER_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
          registry-username: ${{ secrets.DOCKER_REGISTRY_USERNAME || github.actor }}

  # =============================================================================
  # RELEASE MANAGEMENT
  # =============================================================================
  release:
    name: 📦 Release Management
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC for release signing
    needs: [setup, build]
    outputs:
      release-created: ${{ steps.release-mgmt.outputs.release-created }}
      release-version: ${{ steps.release-mgmt.outputs.release-version }}
      release-tag: ${{ steps.release-mgmt.outputs.release-tag }}
    if: |
      always() &&
      needs.setup.outputs.enable-release == 'true' &&
      github.event_name == 'push' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      # Minting the installation token in-job is deliberate: passing a token
      # through `needs.*.outputs.*` makes GitHub Actions strip it with the
      # "Skip output 'token' since it may contain secret." warning, which
      # silently degrades to GITHUB_TOKEN and breaks workflow triggering on
      # release-please PR pushes.
      - name: 🔑 Mint GitHub App token
        id: app-token
        if: ${{ secrets.WORKFLOW_APP_ID != '' && secrets.WORKFLOW_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔍 Resolve prerelease config
        id: prerelease
        shell: bash
        env:
          PRERELEASE_BRANCHES: ${{ needs.setup.outputs.prerelease-branches }}
          CURRENT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          IS_PRERELEASE="false"
          PRERELEASE_TYPE=""

          if [[ "$PRERELEASE_BRANCHES" != "[]" ]]; then
            MATCH=$(echo "$PRERELEASE_BRANCHES" | jq -r \
              --arg branch "$CURRENT_BRANCH" \
              '.[] | select(.branch == $branch) | .label')
            if [[ -n "$MATCH" ]]; then
              IS_PRERELEASE="true"
              PRERELEASE_TYPE="$MATCH"
              echo "Branch '$CURRENT_BRANCH' is a prerelease branch with label '$MATCH'"
            fi
          fi

          echo "is-prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "prerelease-type=$PRERELEASE_TYPE" >> "$GITHUB_OUTPUT"

          # Select config file: use stable config on non-prerelease branches if available
          STABLE_CONFIG="${{ needs.setup.outputs.release-config-file-stable }}"
          DEFAULT_CONFIG="${{ needs.setup.outputs.release-config-file }}"
          if [[ "$IS_PRERELEASE" == "false" && -n "$STABLE_CONFIG" ]]; then
            echo "config-file=$STABLE_CONFIG" >> "$GITHUB_OUTPUT"
            echo "Using stable config: $STABLE_CONFIG"
          else
            echo "config-file=$DEFAULT_CONFIG" >> "$GITHUB_OUTPUT"
            echo "Using default config: $DEFAULT_CONFIG"
          fi

      - name: 📦 Run Release Management
        id: release-mgmt
        uses: navigaite/.github/.github/actions/release-management@v2
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          strategy: ${{ needs.setup.outputs.release-strategy }}
          force-patch-on-no-release: ${{ needs.setup.outputs.release-force-patch-on-no-release }}
          extra-plugins: ${{ needs.setup.outputs.release-extra-plugins }}
          config-file: ${{ steps.prerelease.outputs.config-file }}
          manifest-file: ${{ needs.setup.outputs.release-manifest-file }}
          target-branch: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is-prerelease }}
          prerelease-type: ${{ steps.prerelease.outputs.prerelease-type }}
          release-type: ${{ needs.setup.outputs.release-type != '' && needs.setup.outputs.release-type || (needs.setup.outputs.stack == 'nodejs' && 'node' || needs.setup.outputs.stack == 'python' && 'python' || 'simple') }}
  # =============================================================================
  # SYNC MAIN TO DEV (After Release)
  # =============================================================================
  sync-to-dev:
    name: 🔄 Sync to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    needs: [setup, release, deploy-docker]
    if: |
      always() &&
      needs.setup.outputs.enable-sync == 'true' &&
      needs.setup.outputs.enable-release == 'true' &&
      needs.release.outputs.release-created == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.release.result == 'success' &&
      (needs.deploy-docker.result == 'success' || needs.deploy-docker.result == 'skipped')
    steps:
      - name: 🔑 Mint GitHub App token
        id: app-token
        if: ${{ secrets.WORKFLOW_APP_ID != '' && secrets.WORKFLOW_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync Branches
        uses: navigaite/.github/.github/actions/sync-branches@v2
        with:
          source-branch: main
          target-branch: ${{ needs.setup.outputs.sync-target-branch }}
          github-token: ${{ steps.app-token.outputs.token || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          create-pr: false
          auto-merge-pr: true

  # ─── Pipeline Summary ───────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    needs:
      - setup
      - security
      - lint
      - test
      - build
      - deploy-vercel
      - deploy-digitalocean
      - deploy-docker
      - release
      - sync-to-dev
    if: always()
    steps:
      - name: Generate Pipeline Summary
        shell: bash
        env:
          SETUP: ${{ needs.setup.result }}
          SECURITY: ${{ needs.security.result }}
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
          DEPLOY_VERCEL: ${{ needs.deploy-vercel.result }}
          DEPLOY_DO: ${{ needs.deploy-digitalocean.result }}
          DEPLOY_DOCKER: ${{ needs.deploy-docker.result }}
          RELEASE: ${{ needs.release.result }}
          SYNC: ${{ needs.sync-to-dev.result }}
        run: |
          set -euo pipefail
          status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *) echo "❓" ;;
            esac
          }

          {
            echo "## 📊 Pipeline Summary"
            echo ""
            echo "| Stage | Status |"
            echo "| --- | --- |"
            echo "| Setup | $(status_icon "$SETUP") $SETUP |"
            echo "| Security | $(status_icon "$SECURITY") $SECURITY |"
            echo "| Lint | $(status_icon "$LINT") $LINT |"
            echo "| Test | $(status_icon "$TEST") $TEST |"
            echo "| Build | $(status_icon "$BUILD") $BUILD |"
            echo "| Deploy (Vercel) | $(status_icon "$DEPLOY_VERCEL") $DEPLOY_VERCEL |"
            echo "| Deploy (DO) | $(status_icon "$DEPLOY_DO") $DEPLOY_DO |"
            echo "| Deploy (Docker) | $(status_icon "$DEPLOY_DOCKER") $DEPLOY_DOCKER |"
            echo "| Release | $(status_icon "$RELEASE") $RELEASE |"
            echo "| Sync to Dev | $(status_icon "$SYNC") $SYNC |"
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # CHECK GATE — single aggregator for org ruleset required status checks
  # =============================================================================
  check-gate:
    name: Check Gate
    if: always()
    needs:
      - setup
      - security
      - lint
      - test
      - build
      - deploy-vercel
      - deploy-digitalocean
      - deploy-docker
      - release
      - sync-to-dev
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate pipeline result
        shell: bash
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null || { echo "::error::jq not available"; exit 1; }
          echo "Job results: $RESULTS"
          # Fail if any required job failed or was cancelled (skipped is OK)
          FAILURES=$(echo "$RESULTS" | jq -r 'map(select(. == "failure" or . == "cancelled")) | length')
          if [[ "$FAILURES" -gt 0 ]]; then
            echo "::error::Pipeline failed — ${FAILURES} job(s) failed or were cancelled"
            exit 1
          fi
          echo "✅ All pipeline jobs passed or were skipped"
